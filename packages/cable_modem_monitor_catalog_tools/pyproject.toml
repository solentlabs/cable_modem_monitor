[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "solentlabs-cable-modem-monitor-catalog-tools"
version = "0.0.0+dev"
description = "Internal authoring pipeline for the Cable Modem Monitor catalog — HAR analysis, YAML generation, golden-file construction, parity checks. Repo-only; never published."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "solentlabs-cable-modem-monitor-core>=3.14.0a0",
    "solentlabs-cable-modem-monitor-catalog>=3.14.0a0",
    "pydantic>=2.0",
    "ruamel.yaml>=0.17",
]
classifiers = [
    "Private :: Do Not Upload",
]

[tool.hatch.build.targets.wheel]
packages = ["solentlabs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Add Core's package root to sys.path so catalog_tools tests can do
# `from tests._helpers import ...` and resolve to Core's shared
# helpers without duplicating them here.
pythonpath = ["../cable_modem_monitor_core"]
python_files = ["test_*.py"]
