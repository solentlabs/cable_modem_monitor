downstream:
  format: json
  encoding: base64
  # Response is base64-encoded root-level JSON array; loader decodes
  # base64, then wraps non-dict result as {"_raw": [...]}
  arrays:
    - resource: "/setup.cgi?todo=RF_DS_param"
      array_path: "nodes"
      channel_type:
        fixed: qam
      fields:
        - key: DCIDD
          field: channel_id
          type: integer
        - key: FreqD
          field: frequency
          type: frequency
          unit: "Hz"
        - key: PowerD
          field: power
          type: float
          unit: "dBmV"
        - key: SNRD
          field: snr
          type: float
          unit: "dB"
        - key: qamD
          field: modulation
          type: string
        - key: correctedsD
          field: corrected
          type: integer
        - key: uncorrectedsD
          field: uncorrected
          type: integer
    - resource: "/setup.cgi?todo=RF_DS_31_param"
      array_path: "nodes"
      channel_type:
        fixed: ofdm
      fields:
        - key: num
          field: channel_id
          type: integer
        - key: OFDMFreq
          field: frequency
          type: frequency
          unit: "Hz"
        - key: PLC_power
          field: power
          type: float
          unit: "dBmV"
        - key: AV_Data
          field: snr
          type: float
          unit: "dB"

upstream:
  format: json
  resource: "/setup.cgi?todo=RF_US_param"
  array_path: "nodes"
  encoding: base64
  fields:
    - key: upstream
      field: channel_id
      type: integer
    - key: Freq
      field: frequency
      type: frequency
      unit: "MHz"
    - key: rep_power
      field: power
      type: float
      unit: "dBmV"
    - key: modulation
      field: modulation
      type: string
    - key: channelType
      field: channel_type
      type: string
      map:
        "DOCSIS 3.0": "atdma"
  filter:
    modulation:
      not: "QAM_NONE"

# System info extracted by parser.py PostProcessor from Version_Info.
# OFDMA upstream resource declared here to trigger fetch for parse_upstream hook.
system_info:
  sources:
    - format: json
      resource: "/setup.cgi?todo=Version_Info"
      encoding: base64
      fields:
        - key: _placeholder
          field: software_version
          type: string
    # OFDMA upstream channels are extracted by parse_upstream().
    - format: json
      resource: "/setup.cgi?todo=RF_US_31_param"
      encoding: base64
      fields:
        - key: _placeholder
          field: _ofdma_us_trigger
          type: string

# DOCSIS 3.1: aggregate QAM-only totals. OFDM LDPC codewords operate
# at a vastly different scale and are not aggregated.
aggregate:
  total_corrected:
    sum: corrected
    channels: downstream.qam
  total_uncorrected:
    sum: uncorrected
    channels: downstream.qam
