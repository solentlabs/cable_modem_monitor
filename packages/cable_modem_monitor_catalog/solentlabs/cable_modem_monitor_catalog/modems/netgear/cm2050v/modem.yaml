manufacturer: Netgear
model: CM2050V
brands:
  - Nighthawk
transport: http
default_host: "192.168.100.1"

auth:
  strategy: form
  action: "/goform/Login"
  login_page: "/"
  username_field: loginName
  password_field: loginPassword
  encoding: plain

session:
  cookie_name: "XSRF_TOKEN"

hardware:
  docsis_version: "3.1"
  chipset: "Broadcom BCM3390"

status: awaiting_verification

sources:
  auth_config: "HAR capture (#105)"

attribution:
  contributors:
    - github: Dragon1473
      contribution: "HAR capture and testing (Issue #105)"

isps:
  - Comcast
  - Xfinity

notes: |
  Nighthawk DOCSIS 3.1 modem. 32 SC-QAM + OFDM downstream,
  ATDMA + OFDMA upstream. Same tagValueList format as CM2000/CM1200.
  XSRF_TOKEN cookie set on first GET, sent with all subsequent requests.
  Login page at /, POST to /goform/Login.

references:
  issues:
    - 105
