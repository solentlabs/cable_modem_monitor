manufacturer: Netgear
model: CM2050V
brands:
  - Nighthawk
transport: http
default_host: "192.168.100.1"

auth:
  strategy: form
  action: "/goform/Login"
  login_page: "/"
  username_field: loginName
  password_field: loginPassword
  cookie_name: "XSRF_TOKEN"

hardware:
  docsis_version: "3.1"
  chipset: "Broadcom BCM3390"
  release_date: "2020"

status: confirmed

sources:
  auth_config: "[#105 Netgear CM2050V](https://github.com/solentlabs/cable_modem_monitor/issues/105)"
  release_date: "[Netgear press release, September 22, 2020](https://www.businesswire.com/news/home/20200922005367/en/Netgear-Introduces-Industry-first-2.5Gbps-DOCSIS-3.1-Cable-Modems-to-Deliver-Top-Internet-Speeds-to-the-Home) announcing CM2050V availability"
  chipset: "[DSLReports community post](https://www.dslreports.com/forum/r33000298-Netgear-CM2000-vs-Arris-S33-vs-Motorola-MB8611) — same BCM3390 platform as CM2000/CM1200 family"

attribution:
  contributors:
    - github: https://github.com/Dragon1473
      contribution: "HAR capture and testing (Issue #105)"

isps:
  - Comcast
  - Xfinity
notes: |
  Nighthawk DOCSIS 3.1 modem. 32 SC-QAM + OFDM downstream,
  ATDMA + OFDMA upstream. Same tagValueList format as CM2000/CM1200.
  XSRF_TOKEN cookie set on first GET, sent with all subsequent requests.
  Login page at /, POST to /goform/Login.

references:
  issues:
    - "[#105 — [Modem Request] Netgear CM2050V](https://github.com/solentlabs/cable_modem_monitor/issues/105)"
