manufacturer: Netgear
model: C7000v2
transport: http
default_host: "192.168.100.1"

auth:
  strategy: basic
  challenge_cookie: true

actions:
  restart:
    type: http
    method: POST
    endpoint: "/goform/RouterStatus"
    endpoint_pattern: "RouterStatus"
    params:
      buttonSelect: "2"

    pre_fetch_url: "/RouterStatus.htm"
hardware:
  docsis_version: "3.0"
  chipset: "Broadcom BCM3384"
  release_date: "2016"

status: awaiting_verification

sources:
  auth_config: "[#163 C7000v2 HAR](https://github.com/solentlabs/cable_modem_monitor/issues/163)"

  detection_hints: "[#163 C7000v2 HAR](https://github.com/solentlabs/cable_modem_monitor/issues/163)"
attribution:
  contributors:
    - github: https://github.com/Anthranilic
      contribution:
        "[#61](https://github.com/solentlabs/cable_modem_monitor/issues/61)
        and [#163](https://github.com/solentlabs/cable_modem_monitor/issues/163)
        HAR captures and diagnostics"

isps:
  - Comcast
notes: |
  Nighthawk AC1900 WiFi Cable Modem Router combo. DOCSIS 3.0, 24x8 channel bonding.
  Same page structure and JS parsing as C3700. Multi-page parsing:
  DocsisStatus.htm for channel data, RouterStatus.htm for system info.
  Channel data in pipe-delimited JavaScript: InitDsTableTagValue() and
  InitUsTableTagValue(). System info from tagValueList in RouterStatus.htm
  (needs parser.py PostProcessor).

  Basic Auth requires challenge_cookie: every authenticated request must
  carry both Authorization and the XSRF_TOKEN cookie that the modem sets
  on the initial GET /. Same pattern as CM1200 (HTTPS variant).

references:
  issues:
    - "[#61 — [Modem Request] C7000v2](https://github.com/solentlabs/cable_modem_monitor/issues/61)"
    - "[#163 — [Modem Request] C7000v2 (supersedes #61)](https://github.com/solentlabs/cable_modem_monitor/issues/163)"
