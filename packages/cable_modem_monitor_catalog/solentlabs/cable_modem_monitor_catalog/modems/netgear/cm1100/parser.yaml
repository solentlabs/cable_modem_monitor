downstream:
  format: table
  resource: "/DocsisStatus.asp"
  tables:
    # SC-QAM downstream: 32 channels
    # Columns: Channel | Lock Status | Modulation | Channel ID |
    #          Frequency | Power | SNR/MER | Unerrored CW |
    #          Correctable CW | Uncorrectable CW
    - selector:
        match: "dsTable"
        type: id
      row_start: 1
      columns:
        - index: 0
          field: channel_number
          type: integer
        - index: 1
          field: lock_status
          type: lock_status
        - index: 2
          field: modulation
          type: string
        - index: 3
          field: channel_id
          type: integer
        - index: 4
          field: frequency
          type: frequency
          unit: "Hz"
        - index: 5
          field: power
          type: float
          unit: "dBmV"
        - index: 6
          field: snr
          type: float
          unit: "dB"
        - index: 8
          field: corrected
          type: integer
        - index: 9
          field: uncorrected
          type: integer
      channel_type:
        fixed: qam
      filter:
        lock_status: "locked"
      # OFDM downstream: 2 channels
    - selector:
        match: "d31dsTable"
        type: id
      row_start: 1
      columns:
        - index: 0
          field: source_channel_number
          type: integer
        - index: 1
          field: lock_status
          type: lock_status
        - index: 3
          field: channel_id
          type: integer
        - index: 4
          field: frequency
          type: frequency
          unit: "Hz"
        - index: 5
          field: power
          type: float
          unit: "dBmV"
        - index: 6
          field: snr
          type: float
          unit: "dB"
      channel_type:
        fixed: ofdm
      filter:
        lock_status: "locked"

upstream:
  format: table
  resource: "/DocsisStatus.asp"
  tables:
    # SC-QAM upstream: 8 channels
    # Columns: Channel | Lock Status | Modulation | Channel ID |
    #          Frequency | Power
    - selector:
        match: "usTable"
        type: id
      row_start: 1
      columns:
        - index: 0
          field: channel_number
          type: integer
        - index: 1
          field: lock_status
          type: lock_status
        - index: 2
          field: channel_type
          type: string
          map:
            "ATDMA": "atdma"
            "TDMA": "atdma"
        - index: 3
          field: channel_id
          type: integer
        - index: 4
          field: frequency
          type: frequency
          unit: "Hz"
        - index: 5
          field: power
          type: float
          unit: "dBmV"
      filter:
        lock_status: "locked"
      # OFDMA upstream: 2 channels
    - selector:
        match: "d31usTable"
        type: id
      row_start: 1
      columns:
        - index: 0
          field: source_channel_number
          type: integer
        - index: 1
          field: lock_status
          type: lock_status
        - index: 3
          field: channel_id
          type: integer
        - index: 4
          field: frequency
          type: frequency
          unit: "Hz"
        - index: 5
          field: power
          type: float
          unit: "dBmV"
      channel_type:
        fixed: ofdma
      filter:
        lock_status: "locked"

system_info:
  sources:
    - format: javascript
      resource: "/DocsisStatus.asp"
      functions:
        # InitTagValue: 11-field format (indices 0-10)
        #   0: Acquire DS Channel  1: DS Comment  2: Connectivity State
        #   3: Connectivity Comment  4: Boot State  5: Boot Comment
        #   6: Config File  7: Config Comment  8: Security
        #   9: Security Comment  10: Current System Time
        #
        # Only 11 fields (not 17 like CM1200), so no system_uptime.
        # Two var tagValueList assignments in the function body;
        # the JS parser takes the last match (real state).
        - name: "InitTagValue"
          delimiter: "|"
          fields:
            - offset: 3
              field: docsis_status
              type: string
# Aggregate intentionally omitted. One QAM channel reports billions
# of correctable codewords — likely firmware counter corruption or
# OFDM misclassification (see modem.yaml quirks). Per-channel data
# is still available.
