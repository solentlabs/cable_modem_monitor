manufacturer: Netgear
model: CM1100
transport: http
default_host: "192.168.100.1"

auth:
  strategy: form
  action: "/goform/GenieLogin"
  login_page: "/GenieLogin.asp"
  username_field: loginUsername
  password_field: loginPassword
  cookie_name: "SessionID"
  hidden_fields:
    login: "1"
  success:
    redirect: "/GenieIndex.asp"

hardware:
  docsis_version: "3.1"
  chipset: "Broadcom BCM3390"
  release_date: "2018"

status: confirmed

sources:
  auth_config: "[#104 CM1100 HAR capture](https://github.com/solentlabs/cable_modem_monitor/issues/104)"
  chipset: "[DeviWiki](https://deviwiki.com/wiki/Netgear_CM1100)"
  release_date: "[Netgear CM1100 user manual, August 2018](https://www.downloads.netgear.com/files/GDC/CM1100/CM1100_UM_EN.pdf); Q4 2018 retail availability per AnandTech CES 2019 coverage and DSLReports threads"

attribution:
  contributors:
    - github: https://github.com/dggrzesiak
      contribution: "HAR capture"

isps:
  - Comcast
notes: |
  DOCSIS 3.1 cable modem. HTML table channel data on /DocsisStatus.asp
  (not tagValueList like CM1200/CM2000 — JS tagValueLists contain
  channel counts only). System info (InitTagValue) uses the same JS
  format as CM1200. 32 SC-QAM + OFDM downstream, ATDMA + OFDMA
  upstream. Login form includes webToken CSRF field (dynamic, discovered
  at runtime via login_page). md5.js loaded but password sent plaintext
  in captured HAR. Downstream table has 10 columns (includes Unerrored
  Codewords between SNR and Correctable).
  Session: server-side session expires in under 10 minutes (shorter than
  the default poll interval). LOAD_INTEGRITY detects the stub redirect
  page and re-auths within the same poll; after 2 consecutive recoveries
  the policy disables session reuse for the runtime. Normal behavior —
  session_reuse_disabled=true in diagnostics is expected.
  Codeword counter note: first HAR (unit 1) showed 4,196,002,703
  correctable codewords on the 537 MHz channel — confirmed per-unit by
  second user whose 537 MHz channel reports normal single-digit counts.

references:
  issues:
    - "[#104 — [Modem Request] Netgear CM1100](https://github.com/solentlabs/cable_modem_monitor/issues/104)"
