manufacturer: Netgear
model: CM1100
transport: http
default_host: "192.168.100.1"

auth:
  strategy: form
  action: "/goform/GenieLogin"
  login_page: "/GenieLogin.asp"
  username_field: loginUsername
  password_field: loginPassword
  cookie_name: "SessionID"
  hidden_fields:
    login: "1"
  success:
    redirect: "/GenieIndex.asp"

hardware:
  docsis_version: "3.1"
  chipset: "Broadcom BCM3390"

status: awaiting_verification

sources:
  auth_config: "[#104 CM1100 HAR capture](https://github.com/solentlabs/cable_modem_monitor/issues/104)"

attribution:
  contributors:
    - github: https://github.com/dggrzesiak
      contribution: "HAR capture"

isps:
  - Comcast
notes: |
  DOCSIS 3.1 cable modem. HTML table channel data on /DocsisStatus.asp
  (not tagValueList like CM1200/CM2000 — JS tagValueLists contain
  channel counts only). System info (InitTagValue) uses the same JS
  format as CM1200. 32 SC-QAM + OFDM downstream, ATDMA + OFDMA
  upstream. Login form includes webToken CSRF field (dynamic, discovered
  at runtime via login_page). md5.js loaded but password sent plaintext
  in captured HAR. Downstream table has 10 columns (includes Unerrored
  Codewords between SNR and Correctable).
  Quirk: channel 19 (QAM256, locked, 537 MHz) reports 4,196,002,703
  correctable codewords while every other QAM channel has single-digit
  counts. The 10-column mapping is verified correct against HTML headers.
  Likely firmware counter corruption or an OFDM channel the firmware
  misclassifies as QAM256. This dominates total_corrected. Needs a
  second CM1100 user's data to confirm per-unit vs per-model.

references:
  issues:
    - "[#104 — [Modem Request] Netgear CM1100](https://github.com/solentlabs/cable_modem_monitor/issues/104)"
