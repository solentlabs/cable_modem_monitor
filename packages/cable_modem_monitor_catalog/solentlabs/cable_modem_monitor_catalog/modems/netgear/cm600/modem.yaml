manufacturer: Netgear
model: CM600
transport: http
default_host: "192.168.100.1"

auth:
  strategy: basic

hardware:
  docsis_version: "3.0"
  chipset: "Broadcom BCM3384"
  release_date: "2016-03"
  end_of_life: "2023"

actions:
  restart:
    type: http
    method: POST
    endpoint: "/goform/RouterStatus"
    params:
      RsAction: "2"

status: awaiting_verification

sources:
  chipset: "[CM600 Datasheet](https://www.downloads.netgear.com/files/GDC/datasheet/en/CM600.pdf)"
  auth_config: "[#3 Netgear CM600](https://github.com/solentlabs/cable_modem_monitor/issues/3)"

  hardware: "[CM600 Datasheet](https://www.downloads.netgear.com/files/GDC/datasheet/en/CM600.pdf)"
  detection_hints: "[#3 Netgear CM600](https://github.com/solentlabs/cable_modem_monitor/issues/3)"
attribution:
  contributors:
    - github: chairstacker
      contribution: "[Issue #3](https://github.com/solentlabs/cable_modem_monitor/issues/3) diagnostics"

isps:
  - Comcast
  - Cox
  - Spectrum
  - TWC

notes: |
  DOCSIS 3.0 cable modem (modem-only, no router). 24x8 channel bonding.
  Firmware limitation: System Uptime field is in HH:MM:SS format.
  EOL year: 2023. HTTP Basic Auth (browser popup).
  RouterStatus.asp system info is in JS tagValueList (needs parser.py).

references:
  issues:
    - "[#3 — Netgear CM600 - Login Doesn't Work](https://github.com/solentlabs/cable_modem_monitor/issues/3)"
