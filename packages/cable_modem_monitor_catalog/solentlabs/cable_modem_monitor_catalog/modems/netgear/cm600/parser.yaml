downstream:
  format: table
  resource: "/DocsisStatus.asp"
  tables:
    - selector:
        type: id
        match: "dsTable"
      row_start: 1
      channel_type:
        fixed: "qam"
      columns:
        - index: 1
          field: lock_status
          type: lock_status
        - index: 2
          field: modulation
          type: string
        - index: 3
          field: channel_id
          type: integer
        - index: 4
          field: frequency
          type: frequency
        - index: 5
          field: power
          type: float
          unit: dBmV
        - index: 6
          field: snr
          type: float
          unit: dB
        - index: 7
          field: corrected
          type: integer
        - index: 8
          field: uncorrected
          type: integer

upstream:
  format: table
  resource: "/DocsisStatus.asp"
  tables:
    - selector:
        type: id
        match: "usTable"
      row_start: 1
      columns:
        - index: 1
          field: lock_status
          type: lock_status
        - index: 2
          field: channel_type
          type: string
          map:
            "ATDMA": "atdma"
        - index: 3
          field: channel_id
          type: integer
        - index: 4
          field: symbol_rate
          type: integer
          unit: Ksym/sec
        - index: 5
          field: frequency
          type: frequency
        - index: 6
          field: power
          type: float
          unit: dBmV

system_info:
  sources:
    - format: html_fields
      resource: "/DocsisStatus.asp"
      fields:
        - id: "SystemUpTime"
          pattern: "System Up Time:\\s*(.*)"
          field: system_uptime
          type: string
        - id: "CurrentSystemTime"
          pattern: "Current System Time:\\s*(.*)"
          field: current_time
          type: string
    - format: html_fields
      resource: "/RouterStatus.asp"
      fields:
        - id: "HardwareVersion"
          field: hardware_version
          type: string
        - id: "FirmwareVersion"
          field: software_version
          type: string
