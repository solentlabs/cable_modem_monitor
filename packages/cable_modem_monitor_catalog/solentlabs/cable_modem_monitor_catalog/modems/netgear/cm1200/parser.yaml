downstream:
  format: javascript
  resource: "/DocsisStatus.htm"
  functions:
    # DOCSIS 3.0 QAM: up to 32 channels, 9 fields per channel
    # Layout: channel_num | lock_status | modulation | channel_id |
    #         frequency | power | snr | corrected | uncorrected
    - name: "InitDsTableTagValue"
      delimiter: "|"
      fields_per_channel: 9
      channel_type: "qam"
      fields:
        - offset: 1
          field: lock_status
          type: lock_status
        - offset: 2
          field: modulation
          type: string
        - offset: 3
          field: channel_id
          type: integer
        - offset: 4
          field: frequency
          type: frequency
          unit: "Hz"
        - offset: 5
          field: power
          type: float
          unit: "dBmV"
        - offset: 6
          field: snr
          type: float
          unit: "dB"
        - offset: 7
          field: corrected
          type: integer
        - offset: 8
          field: uncorrected
          type: integer
      filter:
        lock_status: "locked"
      # DOCSIS 3.1 OFDM: 11 fields per channel
      # Layout: channel_num | lock_status | profile_ids | channel_id |
      #         frequency | power | snr | active_range |
      #         unerrored_cw | correctable_cw | uncorrectable_cw
    - name: "InitDsOfdmTableTagValue"
      delimiter: "|"
      fields_per_channel: 11
      channel_type: "ofdm"
      fields:
        - offset: 1
          field: lock_status
          type: lock_status
        - offset: 3
          field: channel_id
          type: integer
        - offset: 4
          field: frequency
          type: frequency
          unit: "Hz"
        - offset: 5
          field: power
          type: float
          unit: "dBmV"
        - offset: 6
          field: snr
          type: float
          unit: "dB"
        - offset: 9
          field: corrected
          type: integer
        - offset: 10
          field: uncorrected
          type: integer
      filter:
        lock_status: "locked"

upstream:
  format: javascript
  resource: "/DocsisStatus.htm"
  functions:
    # DOCSIS 3.0 ATDMA: up to 8 channels, 7 fields per channel
    # Layout: channel_num | lock_status | channel_type | channel_id |
    #         symbol_rate | frequency | power
    # Note: symbol_rate (offset 4) before frequency (offset 5)
    - name: "InitUsTableTagValue"
      delimiter: "|"
      fields_per_channel: 7
      fields:
        - offset: 1
          field: lock_status
          type: lock_status
        - offset: 2
          field: channel_type
          type: string
          map:
            "ATDMA": "atdma"
        - offset: 3
          field: channel_id
          type: integer
        - offset: 4
          field: symbol_rate
          type: integer
          unit: "Ksym/sec"
        - offset: 5
          field: frequency
          type: frequency
          unit: "Hz"
        - offset: 6
          field: power
          type: float
          unit: "dBmV"
      filter:
        lock_status: "locked"
      # DOCSIS 3.1 OFDMA: 6 fields per channel
      # Layout: channel_num | lock_status | profile_ids | channel_id |
      #         frequency | power
    - name: "InitUsOfdmaTableTagValue"
      delimiter: "|"
      fields_per_channel: 6
      channel_type: "ofdma"
      fields:
        - offset: 1
          field: lock_status
          type: lock_status
        - offset: 3
          field: channel_id
          type: integer
        - offset: 4
          field: frequency
          type: frequency
          unit: "Hz"
        - offset: 5
          field: power
          type: float
          unit: "dBmV"
      filter:
        lock_status: "locked"

system_info:
  sources:
    - format: javascript
      resource: "/DocsisStatus.htm"
      functions:
        # InitTagValue has a documented 11-value format (indices 0-10):
        #   0: Acquire DS Channel  1: DS Comment  2: Connectivity State
        #   3: Connectivity Comment ("Operational")  4: Boot State
        #   5: Boot Comment  6: Config File  7: Config Comment
        #   8: Security  9: Security Comment  10: Current System Time
        #
        # Both HAR captures show an extended 17-value format (indices 0-16)
        # with undocumented fields at indices 11-16, including system_uptime
        # at index 14. If firmware returns the shorter 11-value format,
        # the parser gracefully skips the out-of-range offset.
        - name: "InitTagValue"
          delimiter: "|"
          fields:
            # Index 3 is the human-readable "Comment" column
            # ("Operational"), matching the docsis_status convention
            # across the fleet. Index 2 is the terse code ("OK").
            - offset: 3
              field: docsis_status
              type: string
            # Index 14 — extended format only (see comment above)
            - offset: 14
              field: system_uptime
              type: string
    # /RouterStatus.htm exposes hardware and firmware version via a
    # separate InitTagValue function. Same JS comment pattern as
    # DocsisStatus.htm (real data on one line, example data in a
    # /* */ block). Matches C3700, CM2000, CM3000 extraction pattern.
    - format: javascript
      resource: "/RouterStatus.htm"
      functions:
        - name: "InitTagValue"
          delimiter: "|"
          fields:
            - offset: 0
              field: hardware_version
              type: string
            - offset: 1
              field: software_version
              type: string

# DOCSIS 3.1: aggregate QAM-only totals. OFDM LDPC codewords operate
# at a vastly different scale (billions vs thousands) and represent a
# different error correction mechanism — they are not aggregated.
# See PARSING_SPEC.md § Aggregate Scoping.
aggregate:
  total_corrected:
    sum: corrected
    channels: downstream.qam
  total_uncorrected:
    sum: uncorrected
    channels: downstream.qam
