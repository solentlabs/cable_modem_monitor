manufacturer: Netgear
model: CM1200
transport: http
default_host: "192.168.100.1"
timeout: 20
auth:
  strategy: basic
  challenge_cookie: true
hardware:
  docsis_version: "3.1"
  chipset: "Broadcom BCM3390"
status: awaiting_verification
sources:
  auth_config: "[#121 CM1200 Broken in 3.13.0](https://github.com/solentlabs/cable_modem_monitor/issues/121)"
attribution:
  contributors:
    - github: DeFlanko
      contribution: "HAR captures and testing"
isps:
  - Comcast
  - Spectrum
  - Cox
notes: |
  DOCSIS 3.1 modem with SC-QAM and OFDM/OFDMA.
  HTTPS variant: Basic Auth with challenge_cookie (401 sets XSRF_TOKEN).
  Timeout increased to 20s for HTTPS latency.
  See modem.yaml for HTTP variant requiring no auth.
references:
  issues:
    - "[#63 — [Modem Request] CM1200](https://github.com/solentlabs/cable_modem_monitor/issues/63)"
    - "[#121 — [Bug]: CM1200 Broken in 3.13.0](https://github.com/solentlabs/cable_modem_monitor/issues/121)"
