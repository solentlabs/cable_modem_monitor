downstream:
  format: javascript
  resource: "/DocsisStatus.htm"
  functions:
    - name: "InitDsTableTagValue"
      delimiter: "|"
      fields_per_channel: 9
      channel_type: "qam"
      fields:
        - offset: 1
          field: lock_status
          type: lock_status
        - offset: 2
          field: modulation
          type: string
        - offset: 3
          field: channel_id
          type: integer
        - offset: 4
          field: frequency
          type: frequency
          unit: "Hz"
        - offset: 5
          field: power
          type: float
          unit: "dBmV"
        - offset: 6
          field: snr
          type: float
          unit: "dB"
        - offset: 7
          field: corrected
          type: integer
        - offset: 8
          field: uncorrected
          type: integer
      filter:
        lock_status: "locked"

upstream:
  format: javascript
  resource: "/DocsisStatus.htm"
  functions:
    - name: "InitUsTableTagValue"
      delimiter: "|"
      fields_per_channel: 7
      fields:
        - offset: 1
          field: lock_status
          type: lock_status
        - offset: 2
          field: channel_type
          type: string
          map:
            "ATDMA": "atdma"
        - offset: 3
          field: channel_id
          type: integer
        - offset: 4
          field: symbol_rate
          type: integer
        - offset: 5
          field: frequency
          type: frequency
          unit: "Hz"
        - offset: 6
          field: power
          type: float
          unit: "dBmV"
      filter:
        lock_status: "locked"

system_info:
  sources:
    - format: javascript
      resource: "/RouterStatus.htm"
      functions:
        - name: "InitTagValue"
          delimiter: "|"
          fields:
            - offset: 0
              field: hardware_version
              type: string
            - offset: 1
              field: software_version
              type: string
