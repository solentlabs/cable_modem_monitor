manufacturer: Netgear
model: CM3000
brands:
  - Nighthawk
transport: http
default_host: "192.168.100.1"

auth:
  strategy: form
  action: "/goform/Login"
  login_page: "/"
  username_field: loginName
  password_field: loginPassword
  cookie_name: "XSRF_TOKEN"

hardware:
  docsis_version: "3.1"
  release_date: "2024"

status: confirmed

sources:
  auth_config: "[#127 Netgear CM3000](https://github.com/solentlabs/cable_modem_monitor/issues/127)"
  release_date: "[Netgear press release, March 12, 2024](https://www.businesswire.com/news/home/20240312800246/en/NETGEAR-Unveils-Next-Generation-of-Connectivity-with-the-Nighthawk-DOCSIS-3.1-High-Speed-Internet-Cable-Modem) announcing Nighthawk CM3000 U.S. availability"

attribution:
  contributors:
    - github: https://github.com/thatosxguy
      contribution: "HAR capture (Issue #127)"

isps:
  - Comcast
  - Cox
  - Spectrum
  - Xfinity

notes: |
  Nighthawk Multi-Gig DOCSIS 3.1 cable modem with 2.5Gbps Ethernet.
  32 SC-QAM + 2 OFDM downstream, 8 ATDMA + 2 OFDMA upstream.
  Same tagValueList format as CM2000/CM2050V/CM1200.
  XSRF_TOKEN cookie set on first GET, sent with all subsequent requests.
  Login page at /, POST to /goform/Login with loginName/loginPassword.
  md5.js loaded on login page but password sent plaintext.

# TODO: New HAR capture needed for provisioned speed
# Same XHR pattern as CM2000/CM2050V — InitProvRateTableUpdateView()
# exists but InitProvRateTableTagValue() data loads via XHR not in
# current capture. Re-capture with har-capture 0.5.1+ (XHR quiescence).

references:
  issues:
    - "[#127 — [Modem Request] Netgear CM3000](https://github.com/solentlabs/cable_modem_monitor/issues/127)"
