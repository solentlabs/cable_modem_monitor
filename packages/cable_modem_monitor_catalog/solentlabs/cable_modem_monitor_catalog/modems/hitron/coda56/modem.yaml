manufacturer: Hitron
model: CODA56
transport: http
default_host: "192.168.100.1"

auth:
  strategy: form
  action: "/goform/home"
  login_page: "/home.html"
  username_field: user
  password_field: pws
  cookie_name: "userid"

hardware:
  docsis_version: "3.1"
  chipset: "Intel Puma 7 (FHCE2703)"
  release_date: "2022"

status: confirmed

sources:
  release_date:
    "[ApprovedModemList — Comcast Xfinity](https://approvedmodemlist.com/comcast-xfinity-approved-modems/)
    — approved for Xfinity retail December 2022; corroborated by
    [Hitron datasheet dated November 2022](https://us.hitrontech.com/wp-content/uploads/2022/11/DS-CODA56RES.pdf)"
  auth_config:
    "[#89 Hitron CODA56](https://github.com/solentlabs/cable_modem_monitor/issues/89)
    — guest mode (user=nologin/pws=nologin)"
  docsis_version:
    "[Hitron CODA56 Product Page](https://us.hitrontech.com/products/consumers/coda56/)
    — DOCSIS 3.1, 2.5 Gbps, 2x2 OFDM;
    [Datasheet (PDF)](https://us.hitrontech.com/wp-content/uploads/2022/11/DS-CODA56RES.pdf)"
  chipset:
    "[iFixit — Hitron CODA Teardown](https://www.ifixit.com/Teardown/Hitron+CODA+Teardown/169712)
    — main SoC Intel FHCE2703 SR3SA (Puma 7); CODA family teardown,
    CODA56 not individually torn down but assumed to share the SoC"

attribution:
  contributors:
    - github: https://github.com/jeremyhuber
      contribution: "HAR capture (Issue #89)"

isps:
  - Comcast
  - Xfinity
notes: |
  DOCSIS 3.1 cable modem. GoAhead-Webs server with HTTPS + HSTS.
  JSON API via /data/*.asp endpoints (Content-Type: text/html but JSON body).
  HAR captured in guest mode (user=nologin, pws=nologin) — read-only access.
  Authenticated mode untested. OFDM/OFDMA channels on separate endpoints
  (dsofdminfo.asp, usofdminfo.asp) but disabled in this capture;
  SC-QAM channels parsed from dsinfo.asp and usinfo.asp.

references:
  issues:
    - "[#89 — [Modem Request] Hitron CODA56](https://github.com/solentlabs/cable_modem_monitor/issues/89)"
