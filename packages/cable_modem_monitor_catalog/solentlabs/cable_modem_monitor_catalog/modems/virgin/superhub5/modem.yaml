notes: |
  DOCSIS 3.1 gateway. OEM: Sagemcom F3896LG-VMB. Chipset: Broadcom BCM3390.
  Also marketed as "Hub 5" or "SuperHub 5".
  REST API at /rest/v1/cablemodem/ - no authentication required.
  33 SC-QAM downstream + 1 OFDM, 5 ATDMA upstream + 1 OFDMA.
  bootFilename shows "vmdg660" (Virgin's internal designation).
  Default IP: 192.168.100.1 (modem mode) or 192.168.0.1 (router mode).
