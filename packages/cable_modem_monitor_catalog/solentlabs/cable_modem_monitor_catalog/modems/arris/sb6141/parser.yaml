downstream:
  format: table_transposed
  resource: "/cmSignalData.htm"
  tables:
    - channel_type:
        fixed: qam

      rows:
        - field: channel_id
          label: "Channel ID"
          type: integer
        - field: frequency
          label: "Frequency"
          type: frequency
          unit: "Hz"
        - field: snr
          label: "Signal to Noise Ratio"
          type: float
          unit: "dB"
        - field: power
          label: "Power Level"
          type: float
          unit: "dBmV"
      selector:
        match: "Downstream"
        type: header_text
    - merge_by:
        - channel_id
      rows:
        - field: channel_id
          label: "Channel ID"
          type: integer
        - field: corrected
          label: "Total Correctable Codewords"
          type: integer
        - field: uncorrected
          label: "Total Uncorrectable Codewords"
          type: integer

      selector:
        match: "Signal Stats (Codewords)"
        type: header_text
upstream:
  format: table_transposed
  resource: "/cmSignalData.htm"
  channel_type:
    fixed: atdma
  rows:
    - field: channel_id
      label: "Channel ID"
      type: integer
    - field: frequency
      label: "Frequency"
      type: frequency
      unit: "Hz"
    - field: power
      label: "Power Level"
      type: float
      unit: "dBmV"
  selector:
    match: "Upstream"
    type: header_text
