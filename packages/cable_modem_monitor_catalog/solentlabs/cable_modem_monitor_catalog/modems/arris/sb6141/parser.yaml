downstream:
  format: table_transposed
  resource: "/cmSignalData.htm"
  tables:
    - channel_type:
        fixed: qam

      rows:
        - field: channel_id
          label: "Channel ID"
          type: integer
        - field: frequency
          label: "Frequency"
          type: frequency
          unit: "Hz"
        - field: snr
          label: "Signal to Noise Ratio"
          type: float
          unit: "dB"
        - field: power
          label: "Power Level"
          type: float
          unit: "dBmV"
      selector:
        match: "Downstream"
        type: header_text
    - merge_by:
        - channel_id
      rows:
        - field: channel_id
          label: "Channel ID"
          type: integer
        - field: corrected
          label: "Total Correctable Codewords"
          type: integer
        - field: uncorrected
          label: "Total Uncorrectable Codewords"
          type: integer

      selector:
        # The codewords table title differs by firmware: 1.0.7.3-SCM02
        # reports "Signal Status (Codewords)", 1.0.7.0-SCM00 reports
        # "Signal Stats (Codewords)" (#177). Match both observed titles
        # explicitly via fallback.
        type: header_text
        match: "Signal Status (Codewords)"
        fallback:
          type: header_text
          match: "Signal Stats (Codewords)"
upstream:
  format: table_transposed
  resource: "/cmSignalData.htm"
  channel_type:
    fixed: atdma
  rows:
    - field: channel_id
      label: "Channel ID"
      type: integer
    - field: frequency
      label: "Frequency"
      type: frequency
      unit: "Hz"
    - field: power
      label: "Power Level"
      type: float
      unit: "dBmV"
  selector:
    match: "Upstream"
    type: header_text

system_info:
  sources:
    - format: html_fields
      resource: "/indexData.htm"
      fields:
        - label: "System Up Time"
          field: system_uptime
          type: uptime
          format: "{days} days {hours}h:{minutes}m:{seconds}s"

    - format: html_fields
      resource: "/cmHelpData.htm"
      fields:
        - css: "td"
          pattern: "Hardware Version:\\s*([^<\\n]+)"
          field: hardware_version
          type: string
        - css: "td"
          pattern: "Firmware Name:\\s*([^<\\n]+)"
          field: software_version
          type: string

aggregate:
  total_corrected:
    channels: downstream
    sum: corrected
  total_uncorrected:
    channels: downstream
    sum: uncorrected
