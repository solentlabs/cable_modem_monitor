manufacturer: ARRIS
model: SB6141
model_aliases:
  - "Motorola SB6141"
brands:
  - "Surfboard"
transport: http
default_host: "192.168.100.1"

auth:
  strategy: none

hardware:
  docsis_version: "3.0"
  chipset: "Broadcom BCM3380"
  end_of_life: "2019"

  release_date: "2011"
actions:
  restart:
    type: http
    method: GET
    endpoint: "/reset.htm"
    params:
      reset_modem: "Restart Cable Modem"

status: awaiting_verification

sources:
  auth_config: "Real hardware captures (HW 7.0 + HW 8.0, April 2026) — no login required"

  chipset: "https://techinfodepot.shoutwiki.com/wiki/Arris_SB6141"
  detection_hints: "[HA Community thread](https://community.home-assistant.io/)"
attribution:
  contributors:
    - github: https://github.com/captain-coredump
      contribution: "Initial fixture and parser"
    - github: https://github.com/vreihen
      contribution: "HA Community verification (October 2025)"
    - github: https://github.com/kwschulz
      contribution: "Real hardware captures HW 7.0 + HW 8.0 (April 2026)"
    - github: https://github.com/rct
      contribution: "Real cmSignalData capture, firmware 1.0.7.0-SCM00 (#177)"

isps:
  - Comcast
  - Cox
  - Spectrum
  - TWC
  - Mediacom
notes: |
  DOCSIS 3.0 8x4 cable modem (released 2011, EOL 2019). Broadcom BCM3380.
  No authentication required; the status page is publicly accessible.
  Transposed table layout (rows = metrics, columns = channels).
  The codewords (error-count) table title differs by firmware: 1.0.7.3-SCM02
  reports "Signal Status (Codewords)", 1.0.7.0-SCM00 reports "Signal Stats
  (Codewords)" (#177). parser.yaml matches both observed titles explicitly via
  selector fallback.
  system_info from cmHelpData.htm (firmware, HW version) and indexData.htm (uptime).
  HW 7.0 and HW 8.0 confirmed on firmware SB_KOMODO-1.0.7.3-SCM02-NOSH.
references:
  prs:
    - "[PR #57 — Added support for Arris CM820B modem.](https://github.com/solentlabs/cable_modem_monitor/pull/57)"
