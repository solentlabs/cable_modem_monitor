notes: |
  DOCSIS 3.0 / PacketCable 2.0 Telephony Modem (released ~2016).
  No authentication required — CGI endpoints are publicly accessible.
  Same CGI structure as CM820B: /cgi-bin/status_cgi (channels + uptime)
  and /cgi-bin/vers_cgi (firmware/hardware version). Version info
  requires parser.py post-processor to parse the "System:" blob.

