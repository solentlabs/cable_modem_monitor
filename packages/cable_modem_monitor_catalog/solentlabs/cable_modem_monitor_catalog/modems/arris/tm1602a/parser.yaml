downstream:
  format: table
  resource: "/cgi-bin/status_cgi"
  tables:
    - selector:
        type: header_text
        match: "DCID"
      row_start: 1
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: frequency
          type: frequency
          unit: MHz
        - index: 3
          field: power
          type: float
          unit: dBmV
        - index: 4
          field: snr
          type: float
          unit: dB
        - index: 5
          field: modulation
          type: string
        - index: 7
          field: corrected
          type: integer
        - index: 8
          field: uncorrected
          type: integer
      channel_type:
        fixed: qam

upstream:
  format: table
  resource: "/cgi-bin/status_cgi"
  tables:
    - selector:
        type: header_text
        match: "UCID"
      row_start: 1
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: frequency
          type: frequency
          unit: MHz
        - index: 3
          field: power
          type: float
          unit: dBmV
        - index: 5
          field: symbol_rate
          type: integer
          unit: "kSym/s"
      channel_type:
        fixed: atdma

system_info:
  sources:
    - format: html_fields
      resource: "/cgi-bin/status_cgi"
      fields:
        - label: "System Uptime"
          field: system_uptime
          type: string
    - format: html_fields
      resource: "/cgi-bin/vers_cgi"
      fields:
        - label: "Firmware Name"
          field: firmware_name
          type: string
        - label: "Firmware Build Time"
          field: firmware_build_time
          type: string
        - label: "System"
          field: hardware_version
          type: string
          pattern: "HW_REV:\\s*(.+)"
        - label: "System"
          field: software_version
          type: string
          pattern: "SW_REV:\\s*(.+)"
        - label: "System"
          field: model
          type: string
          pattern: "MODEL:\\s*(.+)"
