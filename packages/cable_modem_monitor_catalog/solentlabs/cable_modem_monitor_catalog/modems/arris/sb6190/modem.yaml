manufacturer: ARRIS
model: SB6190
brands:
  - "Surfboard"
transport: http
default_host: "192.168.100.1"

auth:
  strategy: none

hardware:
  docsis_version: "3.0"
  chipset: "Intel Puma 6"
  end_of_life: "2023"

  release_date: "2016"
status: awaiting_verification

sources:
  auth_config:
    "[#93 SB6190 support](https://github.com/solentlabs/cable_modem_monitor/issues/93)
    — no login required on older firmware"

  chipset: "https://techinfodepot.shoutwiki.com/wiki/Arris_SB6190"
  detection_hints: "[PR #22 SB6190 parser](https://github.com/solentlabs/cable_modem_monitor/pull/22)"
attribution:
  contributors:
    - github: sfennell
      contribution:
        "[PR #22](https://github.com/solentlabs/cable_modem_monitor/pull/22)
        verification"

isps:
  - Comcast
  - Cox
  - Spectrum
  - TWC
notes: |
  Two firmware variants with different auth requirements:
  - Older firmware: No authentication required
  - Newer firmware (9.1.103+): Form login with client-generated nonce

  Auth flow (form_nonce strategy):
  - POST to /cgi-bin/adv_pwd_cgi with username, password, ar_nonce fields
  - No encoding - plain form fields
  - Nonce: 8 random digits (client-generated)
  - Response: "Url:/path" (success) or "Error:msg" (failure)
  - Session: credential cookie

  Parser based on SB6141 code; fixture provenance unknown.
  URL format differs from SB6141: uses .html extension vs .asp
references:
  issues:
    - "[#83 — [Bug]: SB6190 parser error](https://github.com/solentlabs/cable_modem_monitor/issues/83)"
    - "[#93 — Arris SB6190](https://github.com/solentlabs/cable_modem_monitor/issues/93)"
  prs:
    - "[PR #22 — Adding support for Arris SB6190](https://github.com/solentlabs/cable_modem_monitor/pull/22)"
