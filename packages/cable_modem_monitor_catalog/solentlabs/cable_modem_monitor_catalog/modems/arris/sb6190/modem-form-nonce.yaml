manufacturer: ARRIS
model: SB6190
brands:
  - "Surfboard"
transport: http
default_host: "192.168.100.1"

auth:
  strategy: form_nonce
  action: "/cgi-bin/adv_pwd_cgi"
  username_field: username
  password_field: password
  cookie_name: "credential"

  error_prefix: "Error:"
  nonce_field: ar_nonce
  nonce_length: 8
  success_prefix: "Url:"
hardware:
  docsis_version: "3.0"
  chipset: "Intel Puma 6"
  end_of_life: "2023"
  release_date: "2016"

status: confirmed

sources:
  auth_config:
    "Paul HAR (modem_20260127_201621) — form_nonce login with credential
    cookie"

  chipset: "https://techinfodepot.shoutwiki.com/wiki/Arris_SB6190"
attribution:
  contributors:
    - github: https://github.com/HenryGeorge1978
      contribution: "Auth-variant HAR capture and testing"
    - github: https://github.com/Winesnob
      contribution: "Initial auth-variant report"

isps:
  - Comcast
  - Spectrum
notes: |
  DOCSIS 3.0 cable modem (released 2016, EOL 2023). Intel Puma 6.
  Auth-required variant: firmware 9.1.103+ requires form_nonce login.
  Client generates 8-digit random nonce, POSTs username/password/nonce
  as separate form fields. Response is text-prefixed (Url:/Error:).
  Session maintained via "credential" cookie (path: /cgi-bin/).
  Quirk — Intel Puma 6 chipset: individual channels can report tens of
  millions of corrected/uncorrectable codewords while neighbors show
  hundreds. Two channels dominate any aggregate, making totals
  misleading. Aggregate intentionally omitted; per-channel data is
  available.
  Logout: POST /cgi-bin/logout requires nonce (not expressible in
  current HttpAction model). Session expiry handled by LOAD_AUTH
  recovery — one failed poll per cycle, then self-heals.
references:
  issues:
    - "[#83 — [Bug]: SB6190 parser error](https://github.com/solentlabs/cable_modem_monitor/issues/83)"
    - "[#93 — Arris SB6190](https://github.com/solentlabs/cable_modem_monitor/issues/93)"
  prs:
    - "[PR #22 — Adding support for Arris SB6190](https://github.com/solentlabs/cable_modem_monitor/pull/22)"
