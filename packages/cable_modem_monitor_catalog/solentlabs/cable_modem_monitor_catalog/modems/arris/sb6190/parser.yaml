downstream:
  format: table
  resource: "/cgi-bin/status"
  tables:
    - selector:
        match: "Downstream Bonded Channels"
        type: header_text
      row_start: 2
      columns:
        - index: 0
          field: channel_number
          type: integer
        - index: 1
          field: lock_status
          type: lock_status
        - index: 3
          field: channel_id
          type: integer
        - index: 4
          field: frequency
          type: frequency
          unit: MHz
        - index: 5
          field: power
          type: float
          unit: dBmV
        - index: 6
          field: snr
          type: float
          unit: dB
        - index: 7
          field: corrected
          type: integer
        - index: 8
          field: uncorrected
          type: integer
      channel_type:
        fixed: qam
      filter:
        lock_status: "locked"

upstream:
  format: table
  resource: "/cgi-bin/status"
  tables:
    - selector:
        match: "Upstream Bonded Channels"
        type: header_text
      row_start: 2
      columns:
        - index: 0
          field: channel_number
          type: integer
        - index: 1
          field: lock_status
          type: lock_status
        - index: 2
          field: channel_type
          type: string
          map:
            "ATDMA": "atdma"
            "TDMA": "tdma"
        - index: 3
          field: channel_id
          type: integer
        - index: 5
          field: frequency
          type: frequency
          unit: MHz
        - index: 6
          field: power
          type: float
          unit: dBmV
      filter:
        lock_status: "locked"
system_info:
  sources:
    - format: html_fields
      resource: "/cgi-bin/status"
      fields:
        - field: docsis_status
          label: "DOCSIS Network Access Enabled"
          type: string
          map:
            "Allowed": "Operational"
# Aggregate intentionally omitted. Intel Puma 6 chipset produces
# anomalous error counts on individual channels (88M+ corrected
# vs hundreds on neighbors). Two channels dominate 99.99% of any
# aggregate, making the total misleading. Per-channel data is
# still available.
