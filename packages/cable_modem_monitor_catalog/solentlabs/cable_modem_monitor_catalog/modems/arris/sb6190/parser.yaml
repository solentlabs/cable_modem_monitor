downstream:
  format: table
  resource: "/cgi-bin/status"
  tables:
    - selector:
        match: "Downstream Bonded Channels"
        type: header_text
      row_start: 2
      columns:
        - index: 1
          field: lock_status
          type: lock_status
        - index: 3
          field: channel_id
          type: integer
        - index: 4
          field: frequency
          type: frequency
          unit: MHz
        - index: 5
          field: power
          type: float
          unit: dBmV
        - index: 6
          field: snr
          type: float
          unit: dB
        - index: 7
          field: corrected
          type: integer
        - index: 8
          field: uncorrected
          type: integer
      channel_type:
        fixed: qam
      filter:
        lock_status: "locked"

upstream:
  format: table
  resource: "/cgi-bin/status"
  tables:
    - selector:
        match: "Upstream Bonded Channels"
        type: header_text
      row_start: 2
      columns:
        - index: 1
          field: lock_status
          type: lock_status
        - index: 2
          field: channel_type
          type: string
          map:
            "ATDMA": "atdma"
            "TDMA": "tdma"
        - index: 3
          field: channel_id
          type: integer
        - index: 5
          field: frequency
          type: frequency
          unit: MHz
        - index: 6
          field: power
          type: float
          unit: dBmV
      filter:
        lock_status: "locked"
