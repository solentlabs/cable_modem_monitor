downstream:
  format: table
  resource: "/cgi-bin/status_cgi"
  tables:
    # Downstream QAM: 24 channels, standard 9-column table
    - selector:
        type: header_text
        match: "DCID"
      row_start: 1
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: frequency
          type: frequency
          unit: MHz
        - index: 3
          field: power
          type: float
          unit: dBmV
        - index: 4
          field: snr
          type: float
          unit: dB
        - index: 5
          field: modulation
          type: string
        - index: 7
          field: corrected
          type: integer
        - index: 8
          field: uncorrected
          type: integer
      channel_type:
        fixed: qam
    # Downstream OFDM: sub-header row ("Pilot", "PLC", "Data") auto-skipped
    # (only 3 cells, less than mapped indices). Data rows have 9 cells.
    - selector:
        type: header_text
        match: "Average RxMER"
      row_start: 1
      columns:
        - index: 0
          field: ofdm_label
          type: string
        - index: 1
          field: fft_type
          type: string
        - index: 2
          field: channel_width
          type: float
        - index: 3
          field: active_subcarriers
          type: integer
        - index: 4
          field: first_subcarrier_freq
          type: float
        - index: 5
          field: last_subcarrier_freq
          type: float
        - index: 8
          field: snr
          type: float
      channel_type:
        fixed: ofdm

upstream:
  format: table
  resource: "/cgi-bin/status_cgi"
  tables:
    # Upstream QAM: 4 channels, 7-column table
    - selector:
        type: header_text
        match: "UCID"
      row_start: 1
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: frequency
          type: frequency
          unit: MHz
        - index: 3
          field: power
          type: float
          unit: dBmV
        - index: 5
          field: symbol_rate
          type: integer
          unit: "kSym/s"
        - index: 6
          field: modulation
          type: string
      channel_type:
        fixed: atdma
    # Upstream OFDMA: firmware quirk — 9 data cells vs 7 header cells.
    # Extra cells [4,5] are subcarrier indices (not in header).
    # Actual frequencies are at [6,7], power at [8].
    - selector:
        type: header_text
        match: "Tx Power"
      row_start: 1
      columns:
        - index: 0
          field: ofdm_label
          type: string
        - index: 1
          field: fft_type
          type: string
        - index: 2
          field: channel_width
          type: float
        - index: 3
          field: active_subcarriers
          type: integer
        - index: 6
          field: first_subcarrier_freq
          type: float
        - index: 7
          field: last_subcarrier_freq
          type: float
        - index: 8
          field: power
          type: float
          unit: dBmV
      channel_type:
        fixed: ofdma
# system_info is extracted by parser.py PostProcessor.
# The html_fields parser's label cascade hits wrapper div elements
# before the correct td cells on this page.
