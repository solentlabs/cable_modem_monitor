downstream:
  format: table
  resource: "/cgi-bin/status_cgi"
  tables:
    # Downstream QAM: 24 channels, standard 9-column table
    - selector:
        match: "DCID"
        type: header_text
      row_start: 1
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: frequency
          type: frequency
          unit: MHz
        - index: 3
          field: power
          type: float
          unit: dBmV
        - index: 4
          field: snr
          type: float
          unit: dB
        - index: 5
          field: modulation
          type: string
        - index: 7
          field: corrected
          type: integer
        - index: 8
          field: uncorrected
          type: integer
      channel_type:
        fixed: qam
      # Downstream OFDM: sub-header row ("Pilot", "PLC", "Data") auto-skipped
      # (only 3 cells, less than mapped indices). Data rows have 9 cells.
    - selector:
        match: "Average RxMER"
        type: header_text
      row_start: 1
      columns:
        - index: 0
          field: ofdm_label
          type: string
        - index: 1
          field: fft_type
          type: string
        - index: 2
          field: channel_width
          type: float
        - index: 3
          field: active_subcarriers
          type: integer
        - index: 4
          field: first_subcarrier_freq
          type: float
        - index: 5
          field: last_subcarrier_freq
          type: float
        - index: 8
          field: snr
          type: float
      channel_type:
        fixed: ofdm

upstream:
  format: table
  resource: "/cgi-bin/status_cgi"
  tables:
    # Upstream QAM: 4 channels, 7-column table
    - selector:
        match: "UCID"
        type: header_text
      row_start: 1
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: frequency
          type: frequency
          unit: MHz
        - index: 3
          field: power
          type: float
          unit: dBmV
        - index: 5
          field: symbol_rate
          type: integer
          unit: "kSym/s"
        - index: 6
          field: modulation
          type: string
      channel_type:
        fixed: atdma
      # Upstream OFDMA: firmware quirk — 9 data cells vs 7 header cells.
      # Extra cells [4,5] are subcarrier indices (not in header).
      # Actual frequencies are at [6,7], power at [8].
    - selector:
        match: "Tx Power"
        type: header_text
      row_start: 1
      columns:
        - index: 0
          field: ofdm_label
          type: string
        - index: 1
          field: fft_type
          type: string
        - index: 2
          field: channel_width
          type: float
        - index: 3
          field: active_subcarriers
          type: integer
        - index: 6
          field: first_subcarrier_freq
          type: float
        - index: 7
          field: last_subcarrier_freq
          type: float
        - index: 8
          field: power
          type: float
          unit: dBmV
      channel_type:
        fixed: ofdma
system_info:
  sources:
    - format: html_fields
      resource: "/cgi-bin/status_cgi"
      fields:
        - field: system_uptime
          label: "System Uptime"
          type: string
        - field: cm_status
          label: "CM Status"
          type: string
        - field: current_time
          label: "Time and Date"
          type: string
        - field: hardware_version
          label: "Hardware Model"
          type: string
