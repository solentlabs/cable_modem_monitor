manufacturer: ARRIS
model: SB8200
transport: http
default_host: "192.168.100.1"

auth:
  strategy: url_token
  login_page: "/cmconnectionstatus.html"
  ajax_login: true
  inject_credential_cookie: true
  cookie_name: "credential"
  success_indicator: "Downstream Bonded Channels"

hardware:
  docsis_version: "3.1"
  hw_version: v7
  firmware: AB01.02.053.01
  chipset: "Broadcom BCM3390"
  release_date: "2017"

actions:
  logout:
    type: http
    method: GET
    endpoint: "/logout.html"
    requires_session: false

status: confirmed

attribution:
  contributors:
    - github: https://github.com/bmn001
      contribution: "HW v6 HAR capture, logout flow HAR, and diagnostics confirmation — verified on beta.11 hardware (Issue #170)"
    - github: https://github.com/rct
      contribution: "HW v7 / AB01.02 confirmation — diagnostics verified (Issue #124)"

sources:
  auth_config: "[#170 — SB8200 v6 body-token auth variant (Spectrum)](https://github.com/solentlabs/cable_modem_monitor/issues/170)"
  chipset: "[DeviWiki](https://deviwiki.com/wiki/Arris_SB8200)"
  hardware: "[ARRIS SB8200 page](https://www.arris.com/surfboard/products/cable-modems/sb8200/)"

isps:
  - Spectrum

notes: |
  Confirmed on two Spectrum hardware revisions: HW v7 / AB01.02.053.01 (#124,
  @rct) and HW v6 / AB01.01.009.51 (#170, @bmn001). HW v6 is the original
  request and the build source for this config — the auth and parser were built
  from the #170 HAR, and @bmn001's beta.11 diagnostics later confirmed that same
  contract on real HW v6 hardware (34 DS + 4 US locked, no errors, full
  system_info). The committed modem-body-token.verified.json fixture is @rct's HW v7
  capture; both revisions exercise the identical auth and parser contract.
  Hardware version does not determine the contract; firmware and ISP
  provisioning do.

  Body-token auth differs from modem-cookie.yaml in one functional way: the
  server does not issue a credential cookie via Set-Cookie on the login
  response. Instead, the server returns a session token in the auth response
  body and the browser JS sets it as the credential cookie:
    createCookie("credential", result)   // result = 31-char server-issued token
  Core replicates this via inject_credential_cookie: true, which sets the
  credential cookie to the auth response body. Confirmed by contributor (#170):
  atob(credential) decodes to binary (server-issued token, not btoa(user:pass)).

  Same page structure and parser as all other SB8200 variants.

  Single-session firmware: port 80 admin interface allows only one active
  session at a time. Configured with actions.logout (requires_session: false) —
  Core calls GET /logout.html after each poll, releasing the session so browser
  access works between fetches. Port 8080 (spectrum analyzer) is a separate
  service with independent session state and is unaffected.

  Quirk — BCM3390 OFDM duplicate corrected counts: the two OFDM downstream
  channels report identical corrected error counts despite different
  frequencies. Same pattern observed on other BCM3390-based modems (see
  modem-url-token.yaml). Does not affect aggregates (OFDM excluded from
  downstream.qam scope).

references:
  issues:
    - "[#170 — [Modem Request] Arris SB8200 v6 - Spectrum](https://github.com/solentlabs/cable_modem_monitor/issues/170)"
    - "[#124 — SB8200 HTTPS variant (bare base64 token), HW v7 / AB01.02 confirmation](https://github.com/solentlabs/cable_modem_monitor/issues/124)"
