manufacturer: ARRIS
model: SB8200
transport: http
default_host: "192.168.100.1"

auth:
  strategy: url_token
  login_page: "/cmconnectionstatus.html"
  login_prefix: "login_"
  success_indicator: "Downstream Bonded Channels"
  ajax_login: true
  auth_header_data: false

session:
  cookie_name: "sessionId"
  token_prefix: "ct_"

hardware:
  docsis_version: "3.1"
  chipset: "Broadcom BCM3390"

status: awaiting_verification

sources:
  chipset: "DeviWiki"
  auth_config: "#81"

attribution:
  contributors:
    - github: undotcom
      contribution: "Initial SB8200 support (HTTP variant)"
    - github: ctravis8892
      contribution: "HTTPS authentication variant"

isps:
  - Comcast
  - Cox
  - Spectrum
  - Xfinity

notes: |
  DOCSIS 3.1 modem with 32x8 SC-QAM plus OFDM/OFDMA.
  This config covers the HTTPS url_token auth variant (AB01 firmware).
  Spectrum LA firmware (HTTP, no auth) uses a separate variant config.
  Reboot disabled by ISP firmware (CSRF vulnerability history).
  Default credentials: admin / last 8 chars of serial number.

references:
  issues:
    - 42
    - 81
    - 126
