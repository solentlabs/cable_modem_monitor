manufacturer: ARRIS
model: SB8200
brands:
  - "SURFboard"
transport: http
default_host: "192.168.100.1"

auth:
  strategy: none

hardware:
  docsis_version: "3.1"
  hw_version: v7
  firmware: AB01
  chipset: "Broadcom BCM3390"
  release_date: "2017"

status: awaiting_verification

sources:
  auth_config: "[#126 — SB8200 no-auth verification (Service Electric Cablevision)](https://github.com/solentlabs/cable_modem_monitor/issues/126)"
  brands: "[SB8200 product page](https://www.surfboard.com/products/cable-modems/sb8200/) — SURFboard styling"
  chipset: "[DeviWiki](https://deviwiki.com/wiki/Arris_SB8200)"
  hardware: "[ARRIS SB8200 page](https://www.arris.com/surfboard/products/cable-modems/sb8200/)"

attribution:
  contributors:
    - github: https://github.com/MapGuy11
      contribution: "Verification — Service Electric Cablevision, no-auth HTTP variant (Issue #126)"

isps:
  - Service Electric Cablevision

notes: |
  ISP-configured no-auth variant of the AB01 firmware SB8200 (hw_version: 7).
  Some ISPs do not enable authentication on the modem's status page; the
  integration fetches /cmconnectionstatus.html and /cmswinfo.html directly
  without a login step. Same page structure and parser as the auth variants.
  test_data/modem.har is synthesized from the body-token HAR with
  the login request removed. Replace with a real HAR capture when available.

references:
  issues:
    - "[#126 — [Verification] Arris SB8200](https://github.com/solentlabs/cable_modem_monitor/issues/126)"
