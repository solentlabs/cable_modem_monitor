downstream:
  format: table
  resource: "/cmconnectionstatus.html"
  tables:
    - selector:
        type: header_text
        match: "Downstream Bonded Channels"
      row_start: 1
      columns:
        - index: 0
          field: channel_id
          type: integer
        - index: 1
          field: lock_status
          type: lock_status
        - index: 2
          field: modulation
          type: string
        - index: 2
          field: channel_type
          type: string
          map:
            "QAM256": "qam"
            "QAM64": "qam"
            "Other": "ofdm"
        - index: 3
          field: frequency
          type: frequency
        - index: 4
          field: power
          type: float
          unit: dBmV
        - index: 5
          field: snr
          type: float
          unit: dB
        - index: 6
          field: corrected
          type: integer
        - index: 7
          field: uncorrected
          type: integer

upstream:
  format: table
  resource: "/cmconnectionstatus.html"
  tables:
    - selector:
        type: header_text
        match: "Upstream Bonded Channels"
      row_start: 1
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: lock_status
          type: lock_status
        - index: 3
          field: channel_type
          type: string
          map:
            "SC-QAM Upstream": "qam"
            "OFDM Upstream": "ofdma"
        - index: 4
          field: frequency
          type: frequency
        - index: 5
          field: width
          type: frequency
        - index: 6
          field: power
          type: float
          unit: dBmV

system_info:
  sources:
    - format: html_fields
      resource: "/cmswinfo.html"
      fields:
        - css: "table.simpleTable:nth-of-type(1) tr:nth-of-type(3) td:nth-of-type(2)"
          field: hardware_version
          type: string
        - css: "table.simpleTable:nth-of-type(1) tr:nth-of-type(4) td:nth-of-type(2)"
          field: software_version
          type: string
        - css: "table.simpleTable:nth-of-type(2) tr:nth-of-type(2) td:nth-of-type(2)"
          field: system_uptime
          type: string
