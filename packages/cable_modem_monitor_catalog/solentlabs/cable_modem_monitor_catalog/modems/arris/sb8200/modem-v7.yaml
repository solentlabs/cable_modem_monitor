manufacturer: ARRIS
model: SB8200
transport: http
default_host: "192.168.100.1"

auth:
  strategy: url_token
  login_page: "/cmconnectionstatus.html"
  login_prefix: ""
  ajax_login: true
  auth_header_data: false
  cookie_name: "credential"
  success_indicator: "Downstream Bonded Channels"

hardware:
  docsis_version: "3.1"
  hw_version: v7
  firmware: AB01
  chipset: "Broadcom BCM3390"
  release_date: "2017"

status: awaiting_verification

sources:
  auth_config: "[#124 SB8200 bare base64 variant](https://github.com/solentlabs/cable_modem_monitor/issues/124)"
  chipset: "[DeviWiki](https://deviwiki.com/wiki/Arris_SB8200)"
  hardware: "[ARRIS SB8200 page](https://www.arris.com/surfboard/products/cable-modems/sb8200/)"

attribution:
  contributors:
    - github: https://github.com/northstarcomp
      contribution: "HW v7 capture and testing (Issue #124)"

isps:
  - Spectrum

notes: |
  HW v7 firmware variant (AB01.02.053_082120). Uses bare base64
  credentials in query string — no login_ prefix, no ct_ token.
  Cookie name is "credential" instead of "sessionId".
  Same page structure and parser as other SB8200 variants.

references:
  issues:
    - "[#124 — Arris SB8200 HTTPS variant (bare base64 token)](https://github.com/solentlabs/cable_modem_monitor/issues/124)"
