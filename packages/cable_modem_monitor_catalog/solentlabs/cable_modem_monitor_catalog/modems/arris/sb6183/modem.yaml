notes: |
  No authentication required — status pages are openly accessible.

  Firmware version from submitter: D30CM-OSPREY-2.4.0.3-GA-00-NOSH

  Status page is the root page (/), which is equivalent to /RgConnect.asp.
  Additional pages available but not parsed:
  - /RgSwInfo.asp — software version, uptime
  - /RgEventLog.asp — event log
  - /RgAddress.asp — MAC, serial
  - /RgConfiguration.asp — downstream frequency plan, upstream channel ID

  16x4 channel bonding (16 downstream, 4 upstream).

