downstream:
  format: hnap
  response_key: GetCustomerStatusDownstreamChannelInfoResponse
  data_key: CustomerConnDownstreamChannel
  record_delimiter: "|+|"
  field_delimiter: "^"
  channels:
    - field: lock_status
      type: string
      index: 1
    - field: channel_type
      type: string
      index: 2
    - field: channel_id
      type: integer
      index: 3
    - field: frequency
      type: frequency
      index: 4
    - field: power
      type: float
      index: 5
    - field: snr
      type: float
      index: 6
    - field: corrected
      type: integer
      index: 7
    - field: uncorrected
      type: integer
      index: 8
  channel_type:
    index: 2
    map:
      256QAM: qam
      OFDM PLC: ofdm
  filter:
    channel_id:
      not: 0

upstream:
  format: hnap
  response_key: GetCustomerStatusUpstreamChannelInfoResponse
  data_key: CustomerConnUpstreamChannel
  record_delimiter: "|+|"
  field_delimiter: "^"
  channels:
    - field: lock_status
      type: string
      index: 1
    - field: channel_type
      type: string
      index: 2
    - field: channel_id
      type: integer
      index: 3
    - field: symbol_rate
      type: frequency
      index: 4
    - field: frequency
      type: frequency
      index: 5
    - field: power
      type: float
      index: 6
  channel_type:
    index: 2
    map:
      SC-QAM: qam
      OFDMA: ofdma
  filter:
    channel_id:
      not: 0

system_info:
  sources:
    - format: hnap
      response_key: GetArrisDeviceStatusResponse
      fields:
        - source: FirmwareVersion
          field: firmware_version
          type: string
        - source: StatusSoftwareModelName
          field: model_name
          type: string
