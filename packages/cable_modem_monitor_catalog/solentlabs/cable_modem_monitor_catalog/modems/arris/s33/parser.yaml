downstream:
  format: hnap
  response_key: GetCustomerStatusDownstreamChannelInfoResponse
  data_key: CustomerConnDownstreamChannel
  record_delimiter: "|+|"
  field_delimiter: "^"
  fields:
    - field: lock_status
      type: lock_status
      index: 1
    - field: channel_type
      type: string
      index: 2
      map:
        "QAM256": "qam"
        "OFDM PLC": "ofdm"
    - field: channel_id
      type: integer
      index: 3
    - field: frequency
      type: frequency
      index: 4
    - field: power
      type: float
      index: 5
    - field: snr
      type: float
      index: 6
    - field: corrected
      type: integer
      index: 7
    - field: uncorrected
      type: integer
      index: 8

upstream:
  format: hnap
  response_key: GetCustomerStatusUpstreamChannelInfoResponse
  data_key: CustomerConnUpstreamChannel
  record_delimiter: "|+|"
  field_delimiter: "^"
  fields:
    - field: lock_status
      type: lock_status
      index: 1
    - field: channel_type
      type: string
      index: 2
      map:
        "SC-QAM": "qam"
        "OFDMA": "ofdma"
    - field: channel_id
      type: integer
      index: 3
    - field: symbol_rate
      type: frequency
      index: 4
    - field: frequency
      type: frequency
      index: 5
    - field: power
      type: float
      index: 6

system_info:
  sources:
    - format: hnap
      response_key: GetCustomerStatusConnectionInfoResponse
      fields:
        - source: CustomerConnSystemUpTime
          field: system_uptime
          type: string
        - source: StatusSoftwareModelName
          field: model_name
          type: string
    - format: hnap
      response_key: GetArrisDeviceStatusResponse
      fields:
        - source: FirmwareVersion
          field: firmware_version
          type: string

aggregate:
  total_corrected:
    sum: corrected
    channels: downstream
  total_uncorrected:
    sum: uncorrected
    channels: downstream
