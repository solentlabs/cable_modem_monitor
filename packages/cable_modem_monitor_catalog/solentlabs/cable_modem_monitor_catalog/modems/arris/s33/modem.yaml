manufacturer: Arris
model: S33
model_aliases:
  - S33v2
brands:
  - Surfboard
transport: hnap
default_host: 192.168.100.1

auth:
  strategy: hnap
  hmac_algorithm: md5

actions:
  restart:
    type: hnap
    action_name: SetArrisConfigurationInfo
    pre_fetch_action: GetArrisConfigurationInfo
    params:
      Action: reboot
    response_key: SetArrisConfigurationInfoResponse
    result_key: SetArrisConfigurationInfoResult
    success_value: OK

behaviors:
  restart:
    window_seconds: 300

aggregate:
  total_corrected:
    sum: corrected
    channels: downstream
  total_uncorrected:
    sum: uncorrected
    channels: downstream

hardware:
  docsis_version: "3.1"
  chipset: Broadcom BCM3390
  release_date: "2020"

status: awaiting_verification
sources:
  auth_config: "[#32 Arris S33](https://github.com/solentlabs/cable_modem_monitor/issues/32), [#117 S33v2 crash](https://github.com/solentlabs/cable_modem_monitor/issues/117)"
  chipset: "[ModemGuides](https://www.modemguides.com/blogs/modemguides-blog/arris-s33-vs-sb8200-comparison)"
  hardware: "[SURFboard S33 page](https://www.surfboard.com/products/cable-modems/s33/)"
  detection_hints: "[#87 S33 data not updating](https://github.com/solentlabs/cable_modem_monitor/issues/87)"
attribution:
  contributors:
    - github: mmiller7
      contribution: "S33v2 HAR capture and issue #117 report"
    - github: gmogoody
      contribution: "S33 HAR capture and iterative testing (Issue #32, #87)"
isps:
  - Comcast
  - Cox
  - Spectrum
  - Xfinity
notes: |
  HNAP protocol uses GetCustomer* action names (vs MB8611's GetMoto*).
  JavaScript reveals identical protocol structure to MB8611.
  Session stored in sessionStorage.getItem('PrivateKey').
  S33 blocks ICMP ping - HTTP-only health checks required.
  System uptime not available (only current time exposed).
references:
  issues:
    - "[#32 — [Modem Request] Arris S33 - Uptime and Frequency Fixes](https://github.com/solentlabs/cable_modem_monitor/issues/32)"
    - "[#87 — [Bug]: S33 OFDM Channel No Longer Reporting](https://github.com/solentlabs/cable_modem_monitor/issues/87)"
    - "[#117 — [Bug]: Arris S33v2 crashing when monitor enabled](https://github.com/solentlabs/cable_modem_monitor/issues/117)"
