downstream:
  format: json
  resource: "/cgi-bin/luci/admin/gateway/wan_status"
  arrays:
    - array_path: "docsis.dschannel.dschannel"
      channel_type:
        fixed: "qam"
      fields:
        - key: "channelID"
          field: channel_id
          type: integer
        - key: "lockStatus"
          field: lock_status
          type: lock_status
        - key: "modulation"
          field: modulation
          type: string
        - key: "frequency"
          field: frequency
          type: integer
        - key: "powerLevel"
          field: power
          type: float
        - key: "SNRLevel"
          field: snr
          type: float
        - key: "correctableCodewords"
          field: corrected
          type: integer
        - key: "uncorrectableCodewords"
          field: uncorrected
          type: integer
      filter:
        lock_status: "locked"

    - array_path: "docsis.ofdmchannel.ofdmchannel"
      channel_type:
        fixed: "ofdm"
      fields:
        - key: "ofdmID"
          field: channel_id
          type: integer
        - key: "modulation"
          field: modulation
          type: string
        - key: "powerLevel"
          field: power
          type: float
        - key: "DataSubcarriersAverageRxMER"
          field: snr
          type: float
        - key: "activeSubcarrierNumber"
          field: active_subcarriers
          type: integer
        - key: "channelBandwidth"
          field: channel_width
          type: string
        - key: "fftType"
          field: fft_type
          type: string
        - key: "PLCLocked"
          field: lock_status
          type: lock_status
        - key: "status"
          field: status
          type: string
      filter:
        status: "1"

upstream:
  format: json
  resource: "/cgi-bin/luci/admin/gateway/wan_status"
  arrays:
    - array_path: "docsis.uschannel.uschannel"
      fields:
        - key: "channelID"
          field: channel_id
          type: integer
        - key: "lockStatus"
          field: lock_status
          type: lock_status
        - key: "channelType"
          field: channel_type
          type: string
          map:
            "US_TYPE_ATDMA": "atdma"
        - key: "frequency"
          field: frequency
          type: integer
        - key: "powerLevel"
          field: power
          type: float
        - key: "symbolRate"
          field: symbol_rate
          type: integer
          unit: "KSym/sec"
        - key: "modulation"
          field: modulation
          type: string
      filter:
        channel_type:
          not: "UNSUPPORTED"

    - array_path: "docsis.ofdmachannel.ofdmachannel"
      channel_type:
        fixed: "ofdma"
      fields:
        - key: "ofdmaID"
          field: channel_id
          type: integer
        - key: "modulation"
          field: modulation
          type: string
        - key: "reportPower"
          field: power
          type: float
        - key: "activeSubcarrierNumber"
          field: active_subcarriers
          type: integer
        - key: "fftSize"
          field: fft_type
          type: string
        - key: "channelBandwidth"
          field: channel_width
          type: string
        - key: "power"
          field: power_state
          type: string
        - key: "status"
          field: status
          type: string
      filter:
        power_state: "ON"

        status: "1"
system_info:
  sources:
    - format: json
      resource: "/cgi-bin/luci/admin/gateway/wan_status"
      fields:
        - key: "uptime"
          field: system_uptime
          type: string
        - key: "version"
          field: software_version
          type: string
          path: "release"
        - key: "model"
          field: model_name
          type: string
          path: "release"
        - key: "hwversion"
          field: hardware_version
          type: string
          path: "release"
        - key: "docsis_operating_mode"
          field: docsis_version
          type: string
          path: "release"
