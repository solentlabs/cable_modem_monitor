manufacturer: CommScope
model: G54
model_aliases:
  - "G54_COMMSCOPE"
  - "G5X"
transport: http
default_host: "192.168.0.1"

auth:
  strategy: form
  action: "/cgi-bin/luci"
  method: POST
  username_field: luci_username
  password_field: luci_password
  encoding: plain
  success:
    redirect: "/cgi-bin/luci/admin/gateway/wan_status"
  cookie_name: "sysauth"

hardware:
  docsis_version: "3.1"
  chipset: "Broadcom BCM3390"
  release_date: "2023"

status: awaiting_verification

sources:
  chipset: "Inferred from `puma_hw_ver` fields in firmware response"
  auth_config: "[#72 Arris G54](https://github.com/solentlabs/cable_modem_monitor/issues/72)"

  hardware: "[#72 Arris G54](https://github.com/solentlabs/cable_modem_monitor/issues/72)"
  detection_hints: "[#72 Arris G54](https://github.com/solentlabs/cable_modem_monitor/issues/72)"
attribution:
  contributors:
    - github: MrAct1on
      contribution: "Initial G54 support and HAR capture"

isps:
  - Cox
  - Spectrum
  - Xfinity

notes: |
  Gateway device (modem + router combo) with DOCSIS 3.1.
  Uses LuCI (OpenWrt-based) web interface with JSON endpoints.
  Form-based authentication with sysauth cookie.
  Modem was in Bridge mode during fixture capture (WiFi disabled).
  puma_hw_ver fields are legacy naming - actual chipset is BCM3390.
  Default IPs: 192.168.100.1 (modem mode) or 192.168.0.1 (router mode).
references:
  issues:
    - "[#72 — [Modem Request] Arris G54](https://github.com/solentlabs/cable_modem_monitor/issues/72)"
