manufacturer: CommScope
model: G54
model_aliases:
  - "G54_COMMSCOPE"
  - "G5X"
transport: http
default_host: "192.168.0.1"

auth:
  strategy: form
  action: "/cgi-bin/luci"
  method: POST
  username_field: luci_username
  password_field: luci_password
  encoding: plain
  success:
    redirect: "/cgi-bin/luci/admin/gateway/wan_status"

session:
  cookie_name: "sysauth"

hardware:
  docsis_version: "3.1"
  chipset: "Broadcom BCM3390"

status: awaiting_verification

sources:
  chipset: "Inferred from puma_hw_ver fields in firmware"
  auth_config: "HAR capture from issue #72"

attribution:
  contributors:
    - github: MrAct1on
      contribution: "Initial G54 support and HAR capture"

isps:
  - Cox
  - Spectrum
  - Xfinity

notes: |
  Gateway device (modem + router combo) with DOCSIS 3.1.
  Uses LuCI (OpenWrt-based) web interface with JSON API at
  /cgi-bin/luci/admin/gateway/wan_status. Form-based auth
  with sysauth cookie. Four channel arrays (dschannel, ofdmchannel,
  uschannel, ofdmachannel) — parser.py handles OFDM/OFDMA.

references:
  issues:
    - 72
