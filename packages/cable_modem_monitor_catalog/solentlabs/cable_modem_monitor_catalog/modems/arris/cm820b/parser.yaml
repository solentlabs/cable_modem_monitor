downstream:
  format: table
  resource: "/cgi-bin/status_cgi"
  tables:
    - selector:
        match: "DCID"
        type: header_text
      row_start: 1
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: frequency
          type: frequency
          unit: MHz
        - index: 3
          field: power
          type: float
          unit: dBmV
        - index: 4
          field: snr
          type: float
          unit: dB
        - index: 5
          field: modulation
          type: string
        - index: 7
          field: corrected
          type: integer
        - index: 8
          field: uncorrected
          type: integer
      channel_type:
        fixed: qam

upstream:
  format: table
  resource: "/cgi-bin/status_cgi"
  tables:
    - selector:
        match: "UCID"
        type: header_text
      row_start: 2
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: frequency
          type: frequency
          unit: MHz
        - index: 3
          field: power
          type: float
          unit: dBmV
        - index: 5
          field: symbol_rate
          type: integer
          unit: "kSym/s"
        - index: 6
          field: modulation
          type: string
      channel_type:
        fixed: atdma

system_info:
  sources:
    - format: html_fields
      resource: "/cgi-bin/status_cgi"
      fields:
        - field: docsis_status
          label: "CM Status"
          type: string
        - field: system_uptime
          label: "System Uptime"
          type: string
    - format: html_fields
      resource: "/cgi-bin/vers_cgi"
      fields:
        - field: firmware_name
          label: "Firmware Name"
          type: string
        - field: firmware_build_time
          label: "Firmware Build Time"
          type: string
        - field: hardware_version
          label: "System"
          pattern: "HW_REV:\\s*(.+)"
          type: string
        - field: software_version
          label: "System"
          pattern: "SW_REV:\\s*(.+)"
          type: string
        - field: model
          label: "System"
          pattern: "MODEL:\\s*(.+)"
          type: string

aggregate:
  total_corrected:
    channels: downstream
    sum: corrected
  total_uncorrected:
    channels: downstream
    sum: uncorrected
