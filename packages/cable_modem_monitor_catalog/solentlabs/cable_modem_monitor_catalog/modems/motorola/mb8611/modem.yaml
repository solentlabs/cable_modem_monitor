manufacturer: Motorola
model: MB8611
model_aliases:
  - MB8600
  - MB8612
brands: []
transport: hnap
default_host: 192.168.100.1

auth:
  strategy: hnap
  hmac_algorithm: md5

actions:
  restart:
    type: hnap
    action_name: SetStatusSecuritySettings
    params:
      MotoStatusSecurityAction: "1"
      MotoStatusSecXXX: XXX
    response_key: SetStatusSecuritySettingsResponse
    result_key: SetStatusSecuritySettingsResult
    success_value: OK

behaviors:
  restart:
    window_seconds: 300

aggregate:
  total_corrected:
    sum: corrected
    channels: downstream
  total_uncorrected:
    sum: uncorrected
    channels: downstream

hardware:
  docsis_version: "3.1"
  chipset: Broadcom BCM3390

status: verified
sources:
  auth_config: HAR capture (Issue #6)
  chipset: AfrozAhmad review
attribution:
  contributors:
    - github: cvonk
      contribution: HAR captures and iterative testing (Issue #6)
    - github: dlindnegm
      contribution: Original HTML page captures (Issue #4)
    - github: BowlesCR
      contribution: HNAP authentication implementation (Issue #40)
isps:
  - Comcast
  - Xfinity
  - Cox
  - Spectrum
notes: |
  Uses GetMoto* action names (vs S33/S34's GetCustomer*).
  Default credentials: admin / motorola.
  Restart action may not work (Issue #60).
references:
  issues:
    - 4
    - 6
    - 40
    - 60
