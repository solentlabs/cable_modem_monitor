downstream:
  format: table
  resource: "/MotoConnection.asp"
  tables:
    - selector:
        type: header_text
        match: "SNR"
      row_start: 1
      columns:
        - index: 1
          field: lock_status
          type: lock_status
        - index: 2
          field: modulation
          type: string
        - index: 3
          field: channel_id
          type: integer
        - index: 4
          field: frequency
          type: frequency
          unit: MHz
        - index: 5
          field: power
          type: float
          unit: dBmV
        - index: 6
          field: snr
          type: float
          unit: dB
        - index: 7
          field: corrected
          type: integer
        - index: 8
          field: uncorrected
          type: integer
      channel_type:
        fixed: qam
      filter:
        lock_status: "locked"

upstream:
  format: table
  resource: "/MotoConnection.asp"
  tables:
    - selector:
        type: header_text
        match: "Symb. Rate"
      row_start: 1
      columns:
        - index: 1
          field: lock_status
          type: lock_status
        - index: 2
          field: channel_type
          type: string
          map:
            "ATDMA": "atdma"
            "TDMA": "tdma"
        - index: 3
          field: channel_id
          type: integer
        - index: 5
          field: frequency
          type: frequency
          unit: MHz
        - index: 6
          field: power
          type: float
          unit: dBmV
      filter:
        lock_status: "locked"

system_info:
  sources:
    - format: html_fields
      resource: "/MotoConnection.asp"
      fields:
        - label: "System Up Time"
          field: system_uptime
          type: string
    - format: html_fields
      resource: "/MotoSwInfo.asp"
      fields:
        - label: "Hardware Version"
          field: hardware_version
          type: string
        - label: "Software Version"
          field: software_version
          type: string
