manufacturer: Motorola
model: MB7621
transport: http
default_host: "192.168.100.1"

auth:
  strategy: form
  action: "/goform/login"
  username_field: loginUsername
  password_field: loginPassword
  encoding: base64

actions:
  logout:
    type: http
    method: GET
    endpoint: "/logout.asp"
    requires_session: false
  restart:
    type: http
    method: POST
    endpoint: "/goform/MotoSecurity"
    params:
      MotoSecurityAction: "1"

      NewUserId: ""
      OldPassword: ""
      Password: ""
      PasswordReEnter: ""
      UserId: ""
    pre_fetch_url: "/MotoSecurity.asp"

hardware:
  docsis_version: "3.0"
  chipset: "Broadcom BCM3384"
  release_date: "2017"

status: confirmed

sources:
  docsis_version: "https://www.motorola.com/us/mb7621/p"
  auth_config: "Maintainer hardware HAR capture"
  chipset: "https://techinfodepot.shoutwiki.com/wiki/Motorola_MB7621"
  detection_hints: "Maintainer verified"
  isps: "https://www.amazon.com/MOTOROLA-MB7621-Approved-Spectrum-Downloads/dp/B077BL65HS"
  restart: "HAR verified — all form fields from MotoSecurity.asp (2026-03-26 capture)"
  field_observations: "Maintainer dual-HA soak (2026-05-14/15): two HA instances at 30s poll intervals drove the web stack to read timeout while ICMP remained sub-5ms"

attribution:
  contributors:
    - github: https://github.com/kwschulz
      contribution: "Maintainer hardware, initial parser"

isps:
  - Comcast
  - Cox
  - Spectrum
  - TWC
  - CableOne
  - RCN
  - Comcast Xfinity
  - Suddenlink
  - BrightHouse
notes: |
  DOCSIS 3.0 24x8 cable modem (released 2017). Broadcom BCM3384 chipset.
  Form-based authentication with base64 password encoding.
  IP-based session tracking (no cookies). Session expires server-side in
  ~10 minutes — shorter than the default poll interval. Configured with
  actions.logout (requires_session: false) — Core calls GET /logout.asp
  after each poll to release the session so the next poll starts fresh.
  Supports up to 24 downstream and 8 upstream bonded channels (1 Gbps max).
  Restart via the MotoSecurity form — POST all form fields (UserId, OldPassword,
  NewUserId, Password, PasswordReEnter, MotoSecurityAction=1). The form is
  dual-purpose (password change + restart); browser submits all fields on reboot.
  Requires authenticated session (POST is silently ignored without auth).
  Web management stack has limited concurrency. Any successful login
  invalidates an existing session regardless of the originating client, so
  multiple HA instances polling the same modem will repeatedly invalidate
  each other's sessions. Sustained sub-minute polling from two or more
  clients can overrun the web server and produce read timeouts on auth and
  data fetches. The DOCSIS data plane is independent of the management
  plane: ICMP and pass-through traffic continue normally even while the web
  interface is unresponsive.
