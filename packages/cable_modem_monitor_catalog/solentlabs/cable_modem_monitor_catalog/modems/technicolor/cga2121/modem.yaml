manufacturer: Technicolor
model: CGA2121
transport: http
default_host: "192.168.100.1"

auth:
  strategy: form
  action: "/goform/logon"
  method: POST
  username_field: username_login
  password_field: password_login
  cookie_name: "sec"

  encoding: plain
  success:
    redirect: "/basicUX.html"
hardware:
  docsis_version: "3.0"
  chipset: "Broadcom BCM3384ZU"
  release_date: "2015"

status: awaiting_verification

sources:
  auth_config: "[#75 Technicolor CGA2121](https://github.com/solentlabs/cable_modem_monitor/issues/75)"
  chipset: "[FCC Filing](https://fccid.io/RUI-CGA2121COM)"

  detection_hints: "[#75 Technicolor CGA2121](https://github.com/solentlabs/cable_modem_monitor/issues/75)"
attribution:
  contributors:
    - github: sgofferj
      contribution: "HAR capture and initial fixture data"

isps:
  - Telia
notes: |
  DOCSIS 3.0 Wireless Gateway (combo modem/router) for Telia Finland.
  24 downstream channels and 4 upstream channels.
  Known limitations:
  - No frequency data exposed in status page
  - No codeword counts exposed in status page
  Form-based authentication to /goform/logon endpoint.
references:
  issues:
    - "[#75 — [Modem Request] Technicolor CGA2121](https://github.com/solentlabs/cable_modem_monitor/issues/75)"
