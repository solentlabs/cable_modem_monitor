downstream:
  format: table_transposed
  resource: "/network_setup.jst"
  tables:
    - selector:
        type: header_text
        match: "Downstream"
      channel_type:
        field: modulation
        map:
          "QAM256": "qam"
          "OFDM": "ofdm"
      rows:
        - field: channel_id
          label: "Channel ID"
          type: integer
        - field: lock_status
          label: "Lock Status"
          type: lock_status
        - field: frequency
          label: "Frequency"
          type: frequency
          unit: "MHz"
        - field: snr
          label: "SNR"
          type: float
          unit: "dB"
        - field: power
          label: "Power Level"
          type: float
          unit: "dBmV"
        - field: modulation
          label: "Modulation"
          type: string
          map:
            "256 QAM": "QAM256"

    - selector:
        type: header_text
        match: "CM Error Codewords"
      merge_by:
        - channel_id
      rows:
        - field: channel_id
          label: "Channel ID"
          type: integer
        - field: corrected
          label: "Correctable Codewords"
          type: integer
        - field: uncorrected
          label: "Uncorrectable Codewords"
          type: integer

upstream:
  format: table_transposed
  resource: "/network_setup.jst"
  # docsIfUpChannelType (DOCS-IF-MIB, RFC 4546) has no OFDMA value.
  # OFDMA upstream channels are in DOCS-IF31-MIB which defines no channel
  # type field, so the firmware renders the SC-QAM fallback "TDMA" for OFDMA
  # channels. Read channel_type directly from the Channel Type HTML row;
  # "TDMA" maps to "ofdma" because of that firmware convention.
  #
  # The Modulation column is intentionally not extracted: firmware reports a
  # bare "QAM" for SC-QAM upstream (no constellation), which PARSING_SPEC
  # § Canonical modulation values requires be mapped or omitted. It cannot be
  # mapped to a real value, so it is omitted, matching the confirmed XB7.
  selector:
    type: header_text
    match: "Upstream"
  rows:
    - field: channel_id
      label: "Channel ID"
      type: integer
    - field: lock_status
      label: "Lock Status"
      type: lock_status
    - field: frequency
      label: "Frequency"
      type: frequency
      unit: "MHz"
    - field: power
      label: "Power Level"
      type: float
      unit: "dBmV"
    - field: channel_type
      label: "Channel Type"
      type: string
      map:
        "ATDMA": "atdma"
        "TDMA": "ofdma"
    - field: symbol_rate
      label: "Symbol Rate"
      type: integer

system_info:
  sources:
    - format: html_fields
      resource: "/network_setup.jst"
      fields:
        - field: system_uptime
          label: "System Uptime"
          type: uptime
          format: "{days} days {hours}h:{minutes}m:{seconds}s"
        - field: software_version
          label: "Download Version"
          type: string
        - field: downstream_status
          label: "Acquire Downstream Channel"
          type: string
          map:
            "Complete": "Operational"
        - field: upstream_status
          label: "Upstream Ranging"
          type: string
          map:
            "Complete": "Operational"
        - field: hardware_version
          label: "HW Version"
          type: string
        - field: model_name
          label: "Model"
          type: string

    - format: html_fields
      resource: "/software.jst"
      fields:
        - field: software_image_name
          label: "Software Image Name"
          type: string
        - field: packet_cable_version
          label: "Packet Cable"
          type: string

    - format: html_fields
      resource: "/hardware.jst"
      fields:
        - field: memory_total
          label: "DRAM Total Memory"
          type: string
        - field: memory_free
          label: "DRAM Available Memory"
          type: string
        - field: flash_total_memory
          label: "Flash Total Memory"
          type: string
        - field: flash_used_memory
          label: "Flash Used Memory"
          type: string
        - field: flash_available_memory
          label: "Flash Available Memory"
          type: string

computed:
  docsis_status:
    operation: combined_status
    inputs:
      ds: downstream_status
      us: upstream_status
  memory_used_pct:
    operation: percent_used
    inputs:
      total: memory_total
      free: memory_free
# DOCSIS 3.1: aggregate intentionally omitted. Firmware duplicates OFDM
# error data onto QAM channel IDs (channel 17 and OFDM channel 194 report
# identical corrected/uncorrected counts — same pattern as XB7), making
# QAM totals unreliable. Per-channel data is still available.
