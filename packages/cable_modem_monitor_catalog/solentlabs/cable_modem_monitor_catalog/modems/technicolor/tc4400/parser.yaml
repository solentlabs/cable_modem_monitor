downstream:
  format: table
  resource: "/cmconnectionstatus.html"
  tables:
    - selector:
        match: "Downstream Channel Status"
        type: header_text
      row_start: 2
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: lock_status
          type: lock_status
        - index: 3
          field: channel_type
          type: string
          map:
            "OFDM": "ofdm"
            "SC-QAM": "qam"
        - index: 4
          field: bonding_status
          type: string
        - index: 5
          field: frequency
          type: frequency
        - index: 6
          field: width
          type: frequency
        - index: 7
          field: snr
          type: float
          unit: dB
        - index: 8
          field: power
          type: float
          unit: dBmV
        - index: 9
          field: modulation
          type: string
        - index: 10
          field: unerrored_codewords
          type: integer
        - index: 11
          field: corrected
          type: integer
        - index: 12
          field: uncorrected
          type: integer

upstream:
  format: table
  resource: "/cmconnectionstatus.html"
  tables:
    - selector:
        match: "Upstream Channel Status"
        type: header_text
      row_start: 2
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: lock_status
          type: lock_status
        - index: 3
          field: channel_type
          type: string
          map:
            "OFDMA": "ofdma"
            "SC-QAM": "qam"
        - index: 4
          field: bonding_status
          type: string
        - index: 5
          field: frequency
          type: frequency
        - index: 6
          field: width
          type: frequency
        - index: 7
          field: power
          type: float
          unit: dBmV
        - index: 8
          field: modulation
          type: string

system_info:
  sources:
    - format: html_fields
      resource: "/cmswinfo.html"
      fields:
        - field: standard_specification_compliant
          label: "Standard Specification Compliant"
          type: string
        - field: hardware_version
          label: "Hardware Version"
          type: string
        - field: software_version
          label: "Software Version"
          type: string
        - field: system_uptime
          label: "System Up Time"
          type: string
        - field: network_access
          label: "Network Access"
          type: string
        - field: board_temperature
          label: "Board Temperature"
          type: string
