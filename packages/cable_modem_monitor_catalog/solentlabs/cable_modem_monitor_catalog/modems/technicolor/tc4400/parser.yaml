# Lock status filter is required on this modem. The TC4400 reports
# channel slots that are currently SC-QAM but were previously OFDM.
# In DOCSIS 3.1 the CMTS can reassign channel profiles dynamically.
# When a slot transitions from OFDM to SC-QAM, the modem retains
# stale LDPC codeword counters from the OFDM era — corrected counts
# in the billions on a channel labeled SC-QAM. Filtering on
# lock_status excludes these ghost channels (typically "Not Locked"
# with 0 Hz frequency or "Unknown" modulation) so their stale
# counters don't pollute QAM aggregates.
downstream:
  format: table
  resource: "/cmconnectionstatus.html"
  tables:
    - selector:
        match: "Downstream Channel Status"
        type: header_text
      row_start: 2
      filter:
        lock_status: "locked"
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: lock_status
          type: lock_status
        - index: 3
          field: channel_type
          type: string
          map:
            "OFDM": "ofdm"
            "SC-QAM": "qam"
        - index: 4
          field: bonding_status
          type: string
        - index: 5
          field: frequency
          type: frequency
        - index: 6
          field: width
          type: frequency
        - index: 7
          field: snr
          type: float
          unit: dB
        - index: 8
          field: power
          type: float
          unit: dBmV
        - index: 9
          field: modulation
          type: string
        - index: 10
          field: unerrored_codewords
          type: integer
        - index: 11
          field: corrected
          type: integer
        - index: 12
          field: uncorrected
          type: integer

upstream:
  format: table
  resource: "/cmconnectionstatus.html"
  tables:
    - selector:
        match: "Upstream Channel Status"
        type: header_text
      row_start: 2
      filter:
        lock_status: "locked"
      columns:
        - index: 1
          field: channel_id
          type: integer
        - index: 2
          field: lock_status
          type: lock_status
        - index: 3
          field: channel_type
          type: string
          map:
            "OFDMA": "ofdma"
            "SC-QAM": "qam"
        - index: 4
          field: bonding_status
          type: string
        - index: 5
          field: frequency
          type: frequency
        - index: 6
          field: width
          type: frequency
        - index: 7
          field: power
          type: float
          unit: dBmV
        - index: 8
          field: modulation
          type: string

system_info:
  sources:
    - format: html_fields
      resource: "/cmswinfo.html"
      fields:
        - field: standard_specification_compliant
          label: "Standard Specification Compliant"
          type: string
        - field: hardware_version
          label: "Hardware Version"
          type: string
        - field: software_version
          label: "Software Version"
          type: string
        - field: system_uptime
          label: "System Up Time"
          type: string
        - field: docsis_status
          label: "Network Access"
          type: string
        - field: board_temperature
          label: "Board Temperature"
          type: string

# DOCSIS 3.1: aggregate QAM-only totals. OFDM LDPC codewords operate
# at a vastly different scale and are not aggregated.
aggregate:
  total_corrected:
    sum: corrected
    channels: downstream.qam
  total_uncorrected:
    sum: uncorrected
    channels: downstream.qam
