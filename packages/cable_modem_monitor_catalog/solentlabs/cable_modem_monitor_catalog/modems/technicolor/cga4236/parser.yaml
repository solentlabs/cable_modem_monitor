downstream:
  format: json
  resource: "/api/v1/modem/exUSTbl,exDSTbl,USTbl,DSTbl,ErrTbl"
  arrays:
    # SC-QAM downstream channels
    - array_path: "data.DSTbl"
      channel_type:
        fixed: qam
      fields:
        - key: ChannelID
          field: channel_id
          type: integer
        - key: Frequency
          field: frequency
          type: frequency
          unit: "MHz"
        - key: PowerLevel
          field: power
          type: float
          unit: "dBmV"
        - key: SNRLevel
          field: snr
          type: float
          unit: "dB"
        - key: Modulation
          field: modulation
          type: string
        - key: Correcteds
          field: corrected
          type: integer
        - key: Uncorrectables
          field: uncorrected
          type: integer
        - key: LockStatus
          field: lock_status
          type: lock_status
      filter:
        lock_status: "locked"
      # OFDM downstream channels
    - array_path: "data.exDSTbl"
      channel_type:
        fixed: ofdm
      fields:
        - key: ChannelID
          field: channel_id
          type: integer
        - key: CentralFrequency
          field: frequency
          type: frequency
          unit: "MHz"
        - key: PowerLevel
          field: power
          type: float
          unit: "dBmV"
        - key: SNRLevel
          field: snr
          type: float
          unit: "dB"
        - key: LockStatus
          field: lock_status
          type: lock_status
      filter:
        lock_status: "locked"

upstream:
  format: json
  resource: "/api/v1/modem/exUSTbl,exDSTbl,USTbl,DSTbl,ErrTbl"
  arrays:
    # SC-QAM upstream channels
    - array_path: "data.USTbl"
      channel_type:
        fixed: atdma
      fields:
        - key: ChannelID
          field: channel_id
          type: integer
        - key: Frequency
          field: frequency
          type: frequency
          unit: "MHz"
        - key: PowerLevel
          field: power
          type: float
          unit: "dBmV"
        - key: Modulation
          field: modulation
          type: string
        - key: SymbolRate
          field: symbol_rate
          type: integer
        - key: LockStatus
          field: lock_status
          type: lock_status
      filter:
        lock_status: "locked"
      # OFDMA upstream channels
    - array_path: "data.exUSTbl"
      channel_type:
        fixed: ofdma
      fields:
        - key: ChannelID
          field: channel_id
          type: integer
        - key: CentralFrequency
          field: frequency
          type: frequency
          fallback_key: StartFrequency
          unit: "MHz"
        - key: PowerLevel
          field: power
          type: float
          unit: "dBmV"
        - key: LockStatus
          field: lock_status
          type: lock_status
      filter:
        lock_status: "locked"

system_info:
  sources:
    - format: json
      resource: "/api/v1/system/CMStatus,ModelName,Manufacturer,SerialNumber,HardwareVersion,SoftwareVersion,UpTime,BootloaderVersion,CoreVersion,FirmwareName,FirmwareBuildTime,ProcessorSpeed,CMMACAddress,LocalTime,Hardware,MemTotal,MemFree,MTAMACAddress"
      fields:
        - key: SoftwareVersion
          field: software_version
          type: string
          path: "data"
        - key: HardwareVersion
          field: hardware_version
          type: string
          path: "data"
        - key: UpTime
          field: system_uptime
          type: string
          path: "data"
        - key: CMStatus
          field: docsis_status
          type: string
          path: "data"
        - key: ModelName
          field: model_name
          type: string
          path: "data"
        - key: ProcessorSpeed
          field: cpu_speed
          type: string
          path: "data"
        - key: MemTotal
          field: memory_total
          type: string
          path: "data"
        - key: MemFree
          field: memory_free
          type: string
          path: "data"
