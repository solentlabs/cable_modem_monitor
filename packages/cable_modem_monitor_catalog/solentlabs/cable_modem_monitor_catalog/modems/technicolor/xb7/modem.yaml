manufacturer: Technicolor
model: XB7
model_aliases:
  - "CGM4331COM"
transport: http
default_host: "10.0.0.1"

auth:
  strategy: form
  action: "/check.jst"
  method: POST
  username_field: username
  password_field: password
  encoding: plain
  success:
    redirect: "/at_a_glance.jst"

session:
  cookie_name: "session"

hardware:
  docsis_version: "3.1"
  chipset: "Broadcom BCM3390"
  release_date: "2020"

status: awaiting_verification

sources:
  auth_config: "[#2 Technicolor XB7](https://github.com/solentlabs/cable_modem_monitor/issues/2)"

  detection_hints: "[#2 Technicolor XB7](https://github.com/solentlabs/cable_modem_monitor/issues/2)"
attribution:
  contributors:
    - github: esand
      contribution: "[Issue #2](https://github.com/solentlabs/cable_modem_monitor/issues/2) verification"

isps:
  - Rogers
  - Comcast
  - Xfinity

notes: |
  DOCSIS 3.1 cable modem + router gateway (CGM4331COM).
  Transposed table format: rows are metrics, columns are channels.
  Default IP: 10.0.0.1 (router mode) or 192.168.100.1 (modem mode).
  Form-based authentication to /check.jst endpoint.
  System uptime format: "X days Xh: Xm: Xs" (note spaces around colons).
  May have localized variants (Italian translations found in Rogers/Italian market).
references:
  issues:
    - "[#2 — Add support for Technicolor XB7](https://github.com/solentlabs/cable_modem_monitor/issues/2)"
    - "[#5 — Login timeouts not handled or debug info being logged w/out debug enabled](https://github.com/solentlabs/cable_modem_monitor/issues/5)"
    - "[#25 — [Bug]: Blocking call to load_default_certs](https://github.com/solentlabs/cable_modem_monitor/issues/25)"
    - "[#107 — [Bug]: Parser error on XB7 with new auth code](https://github.com/solentlabs/cable_modem_monitor/issues/107)"
