manufacturer: Technicolor
model: CGA6444VF
transport: http
default_host: "192.168.0.1"

auth:
  strategy: form_pbkdf2
  login_endpoint: "/api/v1/session/login"
  cookie_name: "PHPSESSID"

  csrf_header: "X-CSRF-TOKEN"
  csrf_init_endpoint: "/api/v1/session/language"
  double_hash: true
  pbkdf2_iterations: 1000
  pbkdf2_key_length: 128
  salt_trigger: "seeksalthash"
  login_success:
    error: "ok"

session:
  headers:
    # Firmware rejects API GETs without these headers — 401 "session
    # expired" moments after a successful login (#120). Every
    # authenticated GET in the contributor HAR carries both. Same
    # behavior as TG3442DE (#86). {base_url} resolves at session build.
    X-Requested-With: "XMLHttpRequest"
    Referer: "{base_url}/"

actions:
  logout:
    type: http
    method: POST
    endpoint: "/api/v1/session/logout"
    requires_session: true
    headers:
      X-Requested-With: "XMLHttpRequest"
    # HAR-observed: the browser ends each session with POST
    # /api/v1/session/logout carrying the PHPSESSID cookie, the rotating
    # X-CSRF-TOKEN (inherited from the auth session headers), and the
    # X-Requested-With AJAX marker. Single-session firmware, so tearing
    # the session down each poll prevents the next login colliding with
    # our own still-open session (MSG_LOGIN_150).

hardware:
  docsis_version: "3.1"
  chipset: "Broadcom BCM3390"
  release_date: "2021"

status: awaiting_verification

sources:
  release_date:
    "[Vodafone Germany CGA6444VF manual, 2021-05-11](https://www.vodafone.de/downloadarea/CGA6444VF-DMS3-CTC-25-593_v2.0_German_public_20210511.pdf)
    — dated official support documentation; corroborated by
    [vodafonekabelforum.de thread, August 2021](https://www.vodafonekabelforum.de/viewtopic.php?t=44454)
    reporting the device newly issued as the Vodafone Station Wi-Fi 6"
  auth_config:
    "[#120 CGA6444VF](https://github.com/solentlabs/cable_modem_monitor/issues/120)
    — PBKDF2 double-hash auth"
  logout_action:
    "[#120 CGA6444VF](https://github.com/solentlabs/cable_modem_monitor/issues/120)
    — POST /api/v1/session/logout observed in the contributor HAR capture"
  chipset: "[DeviWiki CGA4233](https://deviwiki.com/wiki/Technicolor_CGA4233) — same BCM3390 Technicolor gateway platform"

attribution:
  contributors:
    - github: https://github.com/PerryFabregas
      contribution: "HAR capture (Issue #120)"

isps:
  - Vodafone
notes: |
  DOCSIS 3.1 gateway (Vodafone-branded). Same Technicolor REST platform
  family as CGA4236 but different API structure. JSON API at /api/v1/.
  PBKDF2 double-hash auth: first POST with "seeksalthash" returns
  salt + saltwebui, client hashes password with both salts via SJCL,
  sends hashed result. PHPSESSID + X-CSRF-TOKEN (rotating per response).
  Channel data from single /api/v1/sta_docsis_status endpoint.
  System info from /api/v1/sta_status endpoint.
  Single-session enforcement: MSG_LOGIN_150 if another session exists.
  Login semantics (from the firmware's own login JS, #120): success is
  error == "ok" with a session descriptor (uid, Dpd, intf); MSG_LOGIN_1
  is not a failure code. Failures return error != "ok" — MSG_LOGIN_150
  (session busy) or failedAttempts (bad credentials). login_success
  mirrors this. The browser's salt POST also sends logout: <bool> to
  evict a rival session; unimplemented in form_pbkdf2.

references:
  issues:
    - "[#120 — [Modem Request] Vodafone WiFi 6 Station (CGA6444VF)](https://github.com/solentlabs/cable_modem_monitor/issues/120)"
