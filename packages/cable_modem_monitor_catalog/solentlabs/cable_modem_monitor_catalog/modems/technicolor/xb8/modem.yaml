notes: |
  DOCSIS 3.1 Wi-Fi 6E cable modem + router gateway (CGM4981COM),
  successor to the XB7 (CGM4331COM). Same web UI family: form-based
  authentication to /check.jst, transposed channel tables on
  /network_setup.jst, spaced-colon uptime format "X days Xh: Xm: Xs".
  Reconstructed fixture — not a wire capture. No XB8 HAR has been
  contributed. test_data/modem.har uses the XB7 fixture as the
  structural template with real CGM4981COM values substituted from the
  issue #101 diagnostics (v3.12.0 live parse: 34/34 downstream and 5/5
  upstream channels parsed on real hardware, which is the empirical
  basis for the shared page structure). Observed values: channel IDs,
  frequencies, SNR, power, modulation, upstream channel types, error
  codewords, uptime, software/BOOT/hardware versions, model string.
  Unobserved template filler: per-channel lock status, upstream symbol
  rates, unerrored codewords, check.jst POST mechanics. Replace the
  fixture with a real HAR when an XB8 owner contributes one.
  Firmware renders the SC-QAM fallback "TDMA" channel type for OFDMA
  upstream channels (observed on channel 11, modulation OFDMA).
  Quirk — error count duplication observed on XB8 as on XB7: primary
  QAM channel 23 reports corrected/uncorrected counts identical to
  OFDM channel 34. Aggregate intentionally omitted for the same reason
  as the XB7 entry.
references:
  issues:
    - "[#101 — [Modem Request] Technicolor CGM4981COM](https://github.com/solentlabs/cable_modem_monitor/issues/101)"
