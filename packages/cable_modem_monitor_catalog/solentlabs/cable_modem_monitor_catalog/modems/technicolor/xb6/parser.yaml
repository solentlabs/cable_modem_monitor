downstream:
  format: table_transposed
  resource: "/network_setup.jst"
  tables:
    - channel_type:
        field: modulation
        map:
          "256 QAM": "qam"
          "OFDM": "ofdm"

      rows:
        - field: channel_id
          label: "Channel ID"
          type: integer
        - field: lock_status
          label: "Lock Status"
          type: lock_status
        - field: frequency
          label: "Frequency"
          type: frequency
          unit: "MHz"
        - field: snr
          label: "SNR"
          type: float
          unit: "dB"
        - field: power
          label: "Power Level"
          type: float
          unit: "dBmV"
        - field: modulation
          label: "Modulation"
          type: string
      selector:
        match: "Downstream"
        type: header_text
    - merge_by:
        - channel_id
      rows:
        - field: channel_id
          label: "Channel ID"
          type: integer
        - field: corrected
          label: "Correctable Codewords"
          type: integer
        - field: uncorrected
          label: "Uncorrectable Codewords"
          type: integer

      selector:
        match: "CM Error Codewords"
        type: header_text
upstream:
  format: table_transposed
  resource: "/network_setup.jst"
  # docsIfUpChannelType (DOCS-IF-MIB, RFC 4546) has no OFDMA value.
  # OFDMA upstream channels are in DOCS-IF31-MIB which defines no channel
  # type field — the firmware renders the inapplicable SC-QAM field ("TDMA")
  # for OFDMA channels. Derive channel_type from Modulation instead.
  channel_type:
    field: modulation
    map:
      "QAM": "atdma"
      "OFDMA": "ofdma"
  rows:
    - field: channel_id
      label: "Channel ID"
      type: integer
    - field: lock_status
      label: "Lock Status"
      type: lock_status
    - field: frequency
      label: "Frequency"
      type: frequency
      unit: "MHz"
    - field: power
      label: "Power Level"
      type: float
      unit: "dBmV"
    - field: modulation
      label: "Modulation"
      type: string
    - field: symbol_rate
      label: "Symbol Rate"
      type: integer
  selector:
    match: "Upstream"
    type: header_text

system_info:
  sources:
    - format: html_fields
      resource: "/network_setup.jst"
      fields:
        - field: system_uptime
          label: "System Uptime"
          type: uptime
          format: "{days} days {hours}h:{minutes}m:{seconds}s"
        - field: software_version
          label: "Download Version"
          type: string
        - field: downstream_status
          label: "Acquire Downstream Channel"
          type: string
          map:
            "Complete": "Operational"
        - field: upstream_status
          label: "Upstream Ranging"
          type: string
          map:
            "Complete": "Operational"
        - field: hardware_version
          label: "HW Version"
          type: string
        - field: model_name
          label: "Model"
          type: string

computed:
  docsis_status:
    operation: combined_status
    inputs:
      ds: downstream_status
      us: upstream_status

# DOCSIS 3.1: aggregate QAM-only totals. OFDM LDPC codewords operate
# at a vastly different scale and are not aggregated.
aggregate:
  total_corrected:
    sum: corrected
    channels: downstream.qam
  total_uncorrected:
    sum: uncorrected
    channels: downstream.qam
