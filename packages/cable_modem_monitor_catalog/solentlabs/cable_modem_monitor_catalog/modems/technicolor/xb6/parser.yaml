downstream:
  format: table_transposed
  resource: "/network_setup.jst"
  tables:
    - channel_type:
        field: modulation
        map:
          "256 QAM": "qam"
          "OFDM": "ofdm"

      rows:
        - field: channel_id
          label: "Channel ID"
          type: integer
        - field: lock_status
          label: "Lock Status"
          type: lock_status
        - field: frequency
          label: "Frequency"
          type: frequency
          unit: "MHz"
        - field: snr
          label: "SNR"
          type: float
          unit: "dB"
        - field: power
          label: "Power Level"
          type: float
          unit: "dBmV"
        - field: modulation
          label: "Modulation"
          type: string
      selector:
        match: "Downstream"
        type: header_text
    - merge_by:
        - channel_id
      rows:
        - field: channel_id
          label: "Channel ID"
          type: integer
        - field: corrected
          label: "Correctable Codewords"
          type: integer
        - field: uncorrected
          label: "Uncorrectable Codewords"
          type: integer

      selector:
        match: "CM Error Codewords"
        type: header_text
upstream:
  format: table_transposed
  resource: "/network_setup.jst"
  rows:
    - field: channel_id
      label: "Channel ID"
      type: integer
    - field: lock_status
      label: "Lock Status"
      type: lock_status
    - field: frequency
      label: "Frequency"
      type: frequency
      unit: "MHz"
    - field: power
      label: "Power Level"
      type: float
      unit: "dBmV"
    - field: modulation
      label: "Modulation"
      type: string
    - field: symbol_rate
      label: "Symbol Rate"
      type: integer
    - field: channel_type
      label: "Channel Type"
      map:
        "ATDMA": "atdma"
        "TDMA": "atdma"
        "TDMA_AND_ATDMA": "atdma"
      type: string
  selector:
    match: "Upstream"
    type: header_text
