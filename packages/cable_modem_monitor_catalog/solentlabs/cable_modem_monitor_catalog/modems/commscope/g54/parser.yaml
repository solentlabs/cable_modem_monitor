downstream:
  format: json
  resource: "/cgi-bin/luci/admin/gateway/wan_status"
  arrays:
    - array_path: "docsis.dschannel.dschannel"
      channel_type:
        fixed: "qam"
      fields:
        - key: "channelID"
          field: channel_id
          type: integer
        - key: "lockStatus"
          field: lock_status
          type: lock_status
        - key: "modulation"
          field: modulation
          type: string
        - key: "frequency"
          field: frequency
          type: integer
        - key: "powerLevel"
          field: power
          type: float
        - key: "SNRLevel"
          field: snr
          type: float
        - key: "correctableCodewords"
          field: corrected
          type: integer
        - key: "uncorrectableCodewords"
          field: uncorrected
          type: integer
      # DOCSIS 3.1 OSSI requires every downstream channel — SC-QAM and
      # OFDM — to be enumerable in the legacy docsIfDownChannelTable.
      # OFDM channels appear there with modulation="unsupported" (the
      # legacy modulation enum has no OFDM value); rich OFDM data lives
      # in docsIf31CmDsOfdmChanTable. g54's web API mirrors this — the
      # ofdmchannel array below is the canonical source for OFDM rows;
      # the dschannel "UNSUPPORTED" entries are DCID-registration
      # shadows of the same physical channels and would double-count.
      filter:
        lock_status: "locked"
        modulation:
          not: "UNSUPPORTED"

    - array_path: "docsis.ofdmchannel.ofdmchannel"
      channel_type:
        fixed: "ofdm"
      fields:
        - key: "ofdmID"
          field: channel_id
          type: integer
        - key: "modulation"
          field: modulation
          type: string
        # See FIELD_REGISTRY.md § frequency semantics — OFDM/OFDMA
        # frequency is the lower edge of the active subcarrier band.
        - key: "firstFrequency"
          field: frequency
          type: frequency
        - key: "powerLevel"
          field: power
          type: float
        - key: "DataSubcarriersAverageRxMER"
          field: snr
          type: float
        - key: "activeSubcarrierNumber"
          field: active_subcarriers
          type: integer
        - key: "channelBandwidth"
          field: channel_width
          type: float
          scale: 1000000 # MHz → Hz
        - key: "fftType"
          field: fft_type
          type: string
        - key: "PLCLocked"
          field: lock_status
          type: lock_status
        - key: "status"
          field: status
          type: string
      filter:
        status: "1"

upstream:
  format: json
  resource: "/cgi-bin/luci/admin/gateway/wan_status"
  arrays:
    - array_path: "docsis.uschannel.uschannel"
      fields:
        - key: "channelID"
          field: channel_id
          type: integer
        - key: "lockStatus"
          field: lock_status
          type: lock_status
        - key: "channelType"
          field: channel_type
          type: string
          map:
            "US_TYPE_ATDMA": "atdma"
        - key: "frequency"
          field: frequency
          type: integer
        - key: "powerLevel"
          field: power
          type: float
        - key: "symbolRate"
          field: symbol_rate
          type: integer
          unit: "KSym/sec"
        - key: "modulation"
          field: modulation
          type: string
      filter:
        channel_type:
          not: "UNSUPPORTED"

    - array_path: "docsis.ofdmachannel.ofdmachannel"
      channel_type:
        fixed: "ofdma"
      fields:
        - key: "ofdmaID"
          field: channel_id
          type: integer
        - key: "modulation"
          field: modulation
          type: string
        # See FIELD_REGISTRY.md § frequency semantics.
        - key: "firstFrequency"
          field: frequency
          type: frequency
        - key: "reportPower"
          field: power
          type: float
        - key: "activeSubcarrierNumber"
          field: active_subcarriers
          type: integer
        - key: "fftSize"
          field: fft_type
          type: string
        - key: "channelBandwidth"
          field: channel_width
          type: float
          scale: 1000000 # MHz → Hz
        - key: "power"
          field: power_state
          type: string
        - key: "status"
          field: status
          type: string
      filter:
        power_state: "ON"

        status: "1"
system_info:
  sources:
    - format: json
      resource: "/cgi-bin/luci/admin/gateway/wan_status"
      fields:
        - key: "uptime"
          field: system_uptime
          type: uptime
          format: seconds
        - key: "version"
          field: software_version
          type: string
          path: "release"
        - key: "model"
          field: model_name
          type: string
          path: "release"
        - key: "hwversion"
          field: hardware_version
          type: string
          path: "release"
        - key: "docsis_operating_mode"
          field: docsis_version
          type: string
          path: "release"
        - key: "cmStatParamsStatusDescription"
          field: docsis_status
          type: string
          path: "docsis.cmstatus"
          map:
            "DOCSIS_CM_STAT_PARAMS_OPERATIONAL": "Operational"

# DOCSIS 3.1: aggregate QAM-only totals. OFDM LDPC codewords operate
# at a vastly different scale and are not aggregated.
aggregate:
  total_corrected:
    sum: corrected
    channels: downstream.qam
  total_uncorrected:
    sum: uncorrected
    channels: downstream.qam
