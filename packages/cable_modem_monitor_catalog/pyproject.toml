[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "solentlabs-cable-modem-monitor-catalog"
version = "3.14.0-alpha.3"
description = "Cable Modem Monitor Catalog — modem config files and parser overrides"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "solentlabs-cable-modem-monitor-core>=3.14.0a1",
]
license = "MIT"
authors = [
    { name = "Solent Labs™" },
]
keywords = ["docsis", "cable-modem", "monitoring", "home-assistant", "modem-catalog"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Home Automation",
    "Topic :: System :: Networking :: Monitoring",
]

[project.urls]
Homepage = "https://github.com/solentlabs/cable_modem_monitor"
Repository = "https://github.com/solentlabs/cable_modem_monitor"
Documentation = "https://github.com/solentlabs/cable_modem_monitor#readme"
Issues = "https://github.com/solentlabs/cable_modem_monitor/issues"
Changelog = "https://github.com/solentlabs/cable_modem_monitor/blob/main/CHANGELOG.md"
"Supported Modems" = "https://pypi.org/project/solentlabs-cable-modem-monitor-catalog/"

[dependency-groups]
dev = [
    "pydantic>=2.0",
    "solentlabs-cable-modem-monitor-core[sjcl]",
]

[tool.hatch.build.targets.wheel]
packages = ["solentlabs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
