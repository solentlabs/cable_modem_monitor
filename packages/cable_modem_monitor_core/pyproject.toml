[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "solentlabs-cable-modem-monitor-core"
version = "3.14.0-beta.11"
description = "Cable Modem Monitor Core — platform-agnostic DOCSIS monitoring engine"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "beautifulsoup4>=4.12",
    "pyyaml>=6.0.2",
    "defusedxml>=0.7.1",
    "pydantic>=2.0",
    "requests>=2.32.3",
]
license = "MIT"
authors = [
    { name = "Solent Labs™" },
]
keywords = ["docsis", "cable-modem", "monitoring", "home-assistant", "snmp"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Home Automation",
    "Topic :: System :: Networking :: Monitoring",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/solentlabs/cable_modem_monitor"
Repository = "https://github.com/solentlabs/cable_modem_monitor"
Documentation = "https://github.com/solentlabs/cable_modem_monitor#readme"
Issues = "https://github.com/solentlabs/cable_modem_monitor/issues"
Changelog = "https://github.com/solentlabs/cable_modem_monitor/blob/main/CHANGELOG.md"

[project.optional-dependencies]
sjcl = ["cryptography>=44.0"]
cbn = ["cryptography>=44.0"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-socket>=0.7",
    "ruff>=0.15.15",
]

[tool.hatch.build.targets.wheel]
packages = ["solentlabs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--cov=solentlabs/cable_modem_monitor_core",
    "--cov-report=term-missing",
    "--cov-fail-under=80",
]
