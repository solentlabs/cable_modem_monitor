[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "solentlabs-cable-modem-monitor-core"
version = "0.1.0"
description = "Cable Modem Monitor Core — platform-agnostic DOCSIS monitoring engine"
requires-python = ">=3.12"
dependencies = [
    "beautifulsoup4>=4.12",
    "pyyaml>=6.0",
    "defusedxml>=0.7.1",
    "requests>=2.31",
]
license = "MIT"
authors = [
    { name = "Solent Labs" },
]

[project.optional-dependencies]
mcp = ["pydantic>=2.0"]

[dependency-groups]
dev = [
    "solentlabs-cable-modem-monitor-core[mcp]",
    "pytest>=8.0",
    "ruff>=0.14",
]

[tool.hatch.build.targets.wheel]
packages = ["solentlabs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--cov=solentlabs/cable_modem_monitor_core",
    "--cov-report=term-missing",
    "--cov-fail-under=80",
]
