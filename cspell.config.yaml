version: "0.2"
language: en

ignorePaths:
  - .venv/**
  - htmlcov/**
  - RAW_DATA/**
  - captures/**
  - "**/*.har"
  - "**/*.expected.json"

# Random test strings — valid in test fixtures, not vocabulary
ignoreWords:
