[mypy]
# General settings
python_version = 3.12
explicit_package_bases = True
mypy_path = packages/cable_modem_monitor_core:packages/cable_modem_monitor_catalog
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False
warn_redundant_casts = True
warn_unused_ignores = False
warn_no_return = True
warn_unreachable = False
strict_optional = True
strict_equality = True
show_error_codes = True
show_error_context = True
pretty = True
# Exclude test files and tools from strict typing
exclude = (?x)(
    ^tools/
    | ^tests/
    | ^packages/.*/tests/
    | ^packages/.*/scripts/
    | ^codeql/
    | ^scripts/
    | ^RAW_DATA/
    )

# Start with lenient settings, can be made stricter over time
# Gradually increase strictness as type hints are added

# ---------------------------------------------------------------
# Packages (Solent Labs) — stricter settings
# ---------------------------------------------------------------
[mypy-solentlabs.*]
disallow_untyped_defs = True
warn_unused_ignores = True

# ---------------------------------------------------------------
# Third-party libraries — ignore missing stubs
# ---------------------------------------------------------------
# ---------------------------------------------------------------
# HA adapter — warn_return_any disabled because HA types resolve
# as Any when homeassistant is not installed (CI lint job).
# Core packages (solentlabs.*) retain warn_return_any = True.
# ---------------------------------------------------------------
[mypy-custom_components.*]
warn_return_any = False

[mypy-homeassistant.*]
ignore_missing_imports = True

[mypy-beautifulsoup4.*]
ignore_missing_imports = True

[mypy-bs4.*]
ignore_missing_imports = True

[mypy-lxml.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

[mypy-pytest_socket.*]
ignore_missing_imports = True

[mypy-_pytest.*]
ignore_missing_imports = True

[mypy-voluptuous.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-urllib3.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-defusedxml]
ignore_missing_imports = True

[mypy-defusedxml.*]
ignore_missing_imports = True
