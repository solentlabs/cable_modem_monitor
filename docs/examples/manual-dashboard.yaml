# Manual Lovelace dashboard for Cable Modem Monitor.
#
# Static example showing all 24 downstream channels (typical for
# DOCSIS 3.0 modems), 5 upstream channels, and error tracking.
# Adjust channel counts to match your hardware — remove entries
# for fewer channels, add entries following the same pattern
# (sensor.cable_modem_ds_ch_X_power, _snr, etc.) for more.
#
# Referenced from docs/EXAMPLES.md § Manual Dashboard Example.
type: vertical-stack
cards:
  - type: entities
    title: Cable Modem Status
    entities:
      - entity: sensor.cable_modem_status
        name: Status
      - entity: sensor.cable_modem_software_version
        name: Software Version
      - entity: sensor.cable_modem_last_boot_time
        name: Uptime
        format: relative
      - entity: sensor.cable_modem_last_boot_time
        name: Last Boot
        format: datetime
      - entity: sensor.cable_modem_downstream_channel_count
        name: DS Channel Count
      - entity: sensor.cable_modem_upstream_channel_count
        name: US Channel Count
      - entity: sensor.cable_modem_total_corrected_errors
        name: Total Corrected Errors
      - entity: sensor.cable_modem_total_uncorrected_errors
        name: Total Uncorrected Errors
      - entity: button.cable_modem_restart_modem
    show_header_toggle: false
    state_color: false
  - type: history-graph
    title: Downstream Power Levels (dBmV)
    hours_to_show: 24
    entities:
