name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-alpha.*"
      - "v*.*.*-beta.*"
  workflow_dispatch:
    inputs:
      test_pypi:
        description: "Publish to Test PyPI instead"
        required: false
        default: false
        type: boolean

jobs:
  build-core:
    name: Build Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: packages/cable_modem_monitor_core
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-core
          path: packages/cable_modem_monitor_core/dist/

  build-catalog:
    name: Build Catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: packages/cable_modem_monitor_catalog
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-catalog
          path: packages/cable_modem_monitor_catalog/dist/

  publish-core:
    name: Publish Core to PyPI
    needs: build-core
    if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.test_pypi != 'true'
    runs-on: ubuntu-latest
    environment: pypi-core
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-core
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-catalog:
    name: Publish Catalog to PyPI
    needs: [build-catalog, publish-core]
    if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.test_pypi != 'true'
    runs-on: ubuntu-latest
    environment: pypi-catalog
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-catalog
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-core-test:
    name: Publish Core to Test PyPI
    needs: build-core
    if: github.event.inputs.test_pypi == 'true'
    runs-on: ubuntu-latest
    environment: test-pypi-core
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-core
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-catalog-test:
    name: Publish Catalog to Test PyPI
    needs: [build-catalog, publish-core-test]
    if: github.event.inputs.test_pypi == 'true'
    runs-on: ubuntu-latest
    environment: test-pypi-catalog
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-catalog
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
