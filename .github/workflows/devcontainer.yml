name: Devcontainer CI

on:
  workflow_dispatch:
    # Manual trigger available via Actions tab for branches that don't
    # touch the path filters below (e.g. testing a devcontainer change
    # bundled into a larger feature branch).
  push:
    paths:
      - ".devcontainer/**"
      - "docker-compose.test.yml"
      - "scripts/dev/**"
      - "requirements-dev.txt"
      - "tests/requirements.txt"
  pull_request:
    paths:
      - ".devcontainer/**"
      - "docker-compose.test.yml"
      - "scripts/dev/**"
      - "requirements-dev.txt"
      - "tests/requirements.txt"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build and test devcontainer
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: |
            set -e  # Exit on first error
            echo "=== Devcontainer Smoke Test ==="
            docker info
            docker pull --quiet alpine:latest
            echo "Checking pytest can collect tests..."
            .venv/bin/pytest --collect-only -q
            echo "Checking ruff is installed..."
            .venv/bin/ruff --version
            echo "=== All checks passed ==="
