name: Tests

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pip install -e packages/cable_modem_monitor_core
          pip install -e packages/cable_modem_monitor_catalog

      - name: Run tests with pytest
        run: |
          pytest -v --tb=short

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          pytest --cov=custom_components/cable_modem_monitor --cov-report=xml --cov-report=term --cov-fail-under=70

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  test-packages:
    name: Package Tests (Core + Catalog)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Core with extras
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/cable_modem_monitor_core[mcp,sjcl]"
          pip install pytest pytest-socket pytest-cov

      - name: Run Core tests
        working-directory: packages/cable_modem_monitor_core
        run: |
          pytest tests/ -v --tb=short --cov=solentlabs/cable_modem_monitor_core --cov-report=term-missing --cov-fail-under=80

      - name: Install Catalog
        run: |
          pip install -e packages/cable_modem_monitor_catalog

      - name: Run Catalog tests
        working-directory: packages/cable_modem_monitor_catalog
        run: |
          pytest tests/ -v --tb=short --cov=solentlabs/cable_modem_monitor_catalog --cov-report=term-missing --cov-fail-under=90

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.2 black==26.1.0 mypy==1.19.1 types-requests types-PyYAML pytest-socket pydantic types-cryptography requests-mock har-capture>=0.5.0
          pip install -e packages/cable_modem_monitor_core
          pip install -e packages/cable_modem_monitor_catalog

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Check code formatting with black
        run: |
          black --check .

      - name: Type check with mypy
        run: |
          mypy . --config-file=mypy.ini

  validate:
    name: HACS Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate version consistency
        run: |
          # Get version from const.py (regex — avoids importing homeassistant)
          VERSION_CONST=$(grep -oP '^VERSION\s*=\s*"\K[^"]+' custom_components/cable_modem_monitor/const.py)

          # Get version from manifest.json
          VERSION_MANIFEST=$(python -c "import json; print(json.load(open('custom_components/cable_modem_monitor/manifest.json'))['version'])")

          echo "const.py version: $VERSION_CONST"
          echo "manifest.json version: $VERSION_MANIFEST"

          if [ "$VERSION_CONST" != "$VERSION_MANIFEST" ]; then
            echo "Version mismatch detected!"
            echo "Please run: python scripts/release.py <version>"
            exit 1
          fi

          echo "All versions match: $VERSION_CONST"

  pii-check:
    name: PII/Credential Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 har-capture>=0.5.0

      - name: Check fixtures for PII
        run: |
          python packages/cable_modem_monitor_catalog/scripts/check_fixture_pii.py
