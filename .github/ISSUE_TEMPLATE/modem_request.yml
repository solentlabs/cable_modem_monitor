name: New Modem Support Request
description: Request support for a cable modem model not currently supported
title: "[Modem Request] "
labels: ["enhancement", "new modem"]
body:
  - type: markdown
    attributes:
      value: |
        ## Request Support for a New Modem

        Adding support for your modem starts with a **HAR capture** from its web interface. This records the complete HTTP flow — authentication, API calls, page content — everything needed to build a parser.

        **New here?** Read the [Modem Request Guide](https://github.com/solentlabs/cable_modem_monitor/blob/main/docs/MODEM_REQUEST.md) for the full walkthrough — it covers capturing, screening for PII (manually or with AI assist), and submitting.

        **Help grow the catalog.** The catalog includes modems the maintainer can't physically test — it grows when contributors with hardware help analyze captures and propose entries. If you have AI access, you can do significantly more than file a request: analyze your own capture, propose the catalog entry, and help triage other users' submissions. See [AI-Assisted Catalog Contribution](https://github.com/solentlabs/cable_modem_monitor/blob/main/CONTRIBUTING.md#ai-assisted-catalog-contribution).

  - type: input
    id: modem-model
    attributes:
      label: Modem Model
      description: What is the exact model number of your cable modem?
      placeholder: "e.g., Netgear CM1000, Arris SB8200, Motorola MB8600"
    validations:
      required: true

  - type: input
    id: manufacturer
    attributes:
      label: Manufacturer
      description: Who makes this modem?
      placeholder: "e.g., Netgear, Arris, Motorola, Technicolor"
    validations:
      required: true

  - type: input
    id: firmware-version
    attributes:
      label: Firmware Version
      description: What firmware version is your modem running? Usually shown on the modem's status or about page.
      placeholder: "e.g., 1.0.0.15, SB_KOMODO-1.0.7.26-180214-NOSH"
    validations:
      required: true

  - type: input
    id: isp
    attributes:
      label: Internet Service Provider (ISP)
      description: Which ISP are you using?
      placeholder: "e.g., Comcast/Xfinity, Spectrum, Cox, Virgin Media"
    validations:
      required: true

  - type: dropdown
    id: auth-required
    attributes:
      label: Does your modem require login?
      description: When you visit your modem's web interface, do you need to enter a username/password?
      options:
        - "No - pages load without login"
        - "Yes - requires username/password"
        - "Not sure"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

        ## How to Capture

        Use [har-capture](https://github.com/solentlabs/har-capture) to record your modem's web interface.

        ```bash
        # Install (one-time)
        pip install "har-capture[full]"

        # Capture your modem (--patterns selects the PII rule set; network-device covers modems and routers)
        har-capture 192.168.100.1 --patterns network-device
        ```

        har-capture launches its own controlled chromium window — your regular browser's cookies and login state don't carry over, so there's nothing to clear beforehand.

        **During capture:**
        1. Log in if your modem requires authentication
        2. Visit **all pages** — status, connection, DOCSIS, system info, logs
        3. **Wait 3-5 seconds on each page** for async data to load
        4. If your modem requires login, **log out** before closing the browser
        5. Close the browser when done

        **Before sharing:** Search the `.sanitized.har` file for your WiFi password and any other credentials — the sanitizer is best-effort. See the [Modem Request Guide](https://github.com/solentlabs/cable_modem_monitor/blob/main/docs/MODEM_REQUEST.md#important-about-pii-and-sanitization) for what to check.

        Attach the `.sanitized.har.gz` file to this issue.

  - type: textarea
    id: har-file
    attributes:
      label: HAR Capture File
      description: Drag and drop your `.sanitized.har.gz` file here
      placeholder: "Drag and drop your .sanitized.har.gz file here"
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Any other details that might help? (URL patterns you noticed, output from the optional AI HAR audit, anything unusual about the modem.)
      placeholder: |
        - Status page is at http://192.168.100.1/cmconnectionstatus.html
        - HAR audit output (if you ran it)
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched my capture file for my WiFi SSID and password to verify they're not present
          required: true
        - label: I'm willing to install the beta and confirm whether the parser works on my hardware
          required: true
