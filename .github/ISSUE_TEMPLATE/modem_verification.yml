name: Verify Working Modem
description: Confirm a listed modem (marked Awaiting) works correctly
title: "[Verification] Modem Model Name"
labels: ["verification", "modem-support", "community-feedback"]
body:
  - type: checkboxes
    id: model_listed
    attributes:
      label: Is your exact model listed?
      description: Check the [Supported Modems List](https://pypi.org/project/solentlabs-cable-modem-monitor-catalog/). If your model isn't listed, use [New Modem Support Request](https://github.com/solentlabs/cable_modem_monitor/issues/new?template=modem_request.yml) instead.
      options:
        - label: "Yes, my exact model is listed in the supported modems catalog"
          required: true

  - type: markdown
    attributes:
      value: |
        ## Verify Modem Support

        Reports against modems marked **Awaiting** in the catalog confirm the parser works on real hardware. The most useful submission attaches a **diagnostics file** — its data structure is what proves the parser handled your modem correctly.

  - type: input
    id: modem_model
    attributes:
      label: Modem Model
      description: What modem model are you using?
      placeholder: "e.g., Arris SB6190, Motorola MB8600"
    validations:
      required: true

  - type: input
    id: firmware_version
    attributes:
      label: Firmware Version
      description: What firmware version is your modem running? (Check your modem's web interface or diagnostics file)
      placeholder: "e.g., SB_KOMODO-1.0.7.26-180214-NOSH"
    validations:
      required: false

  - type: input
    id: isp
    attributes:
      label: Internet Service Provider (ISP)
      description: Which ISP are you using?
      placeholder: "e.g., Comcast/Xfinity, Spectrum, Cox"
    validations:
      required: false

  - type: checkboxes
    id: features_working
    attributes:
      label: What's Working?
      description: Check all that apply
      options:
        - label: "Downstream channel data (frequency, power, SNR, errors)"
        - label: "Upstream channel data (frequency, power)"
        - label: "System information (firmware, uptime, DOCSIS status)"
        - label: "Modem restart button"

  - type: textarea
    id: issues_found
    attributes:
      label: Any Issues or Limitations?
      description: Are there any features that don't work, data that's incorrect, or missing sensors?
      placeholder: "e.g., Restart button doesn't work, upstream power values show 0, missing 2 downstream channels"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---

        ## Diagnostics File

        Settings → Devices & Services → Cable Modem Monitor → device → three-dot menu → **Download Diagnostics**. Drag and drop below. The file is automatically sanitized (MAC addresses, serial numbers, IPs); review before sharing if you'd like to double-check.

  - type: textarea
    id: diagnostics_file
    attributes:
      label: Diagnostics File
      description: Drag and drop your diagnostics JSON file here
      placeholder: "Drag and drop your diagnostics .json file here"
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other information that might be helpful?
    validations:
      required: false
