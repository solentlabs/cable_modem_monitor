# Netgear CM1200 Configuration
# Source: Diagnostics export from issue #63 (@DeFlanko)

manufacturer: Netgear
model: CM1200
paradigm: html

hardware:
  docsis_version: "3.1"
  chipset: Broadcom BCM3390
  release_date: "2019"

# Provenance tracking
sources:
  detection_hints: "[Issue #63](https://github.com/solentlabs/cable_modem_monitor/issues/63)"

default_host: "192.168.100.1"
timeout: 20 # CM1200 over HTTPS is slow; 10s default causes read timeouts (#121)

auth:
  # CM1200 has two access modes depending on protocol:
  # - HTTP: Pages served without auth (original capture, issue #63)
  # - HTTPS: Basic Auth required (WWW-Authenticate: Basic realm="Netgear")
  #
  # The 401 challenge also sets an XSRF_TOKEN cookie, but the server
  # does not enforce it — Basic Auth alone is sufficient (HAR confirmed #121).
  types:
    none: null # HTTP variant (some ISPs serve pages without auth)
    basic: null # HTTPS variant (requires credentials)

pages:
  public:
    - "/DocsisStatus.htm"

  protected:
    - "/DocsisStatus.htm"

  data:
    downstream_channels: "/DocsisStatus.htm"
    upstream_channels: "/DocsisStatus.htm"
    system_info: "/DocsisStatus.htm"

parser:
  class: NetgearCM1200Parser
  module: custom_components.cable_modem_monitor.modems.netgear.cm1200.parser
  format:
    type: html
    table_layout: javascript_embedded

detection:
  pre_auth:
    - "NETGEAR Modem CM1200"
    - "CM1200"
    - "NETGEAR"
  post_auth:
    - "CM1200"
    - "NETGEAR CM1200"
    - "InitDsTableTagValue"
  page_hint: "/DocsisStatus.htm"

capabilities:
  - scqam_downstream
  - scqam_upstream
  - ofdm_downstream
  - ofdma_upstream
  - system_uptime
  - last_boot_time

# =============================================================================
# STATUS
# =============================================================================
status_info:
  status: verified
  verification_source: "https://github.com/solentlabs/cable_modem_monitor/issues/63"

# =============================================================================
# METADATA
# =============================================================================
fixtures:
  path: modems/netgear/cm1200/fixtures
  source: diagnostics
  firmware_tested: "*"
  last_validated: "2026-01-05"

attribution:
  contributors:
    - github: DeFlanko
      contribution: "[Issue #63](https://github.com/solentlabs/cable_modem_monitor/issues/63) diagnostics"

isps:
  - Comcast
  - Spectrum
  - Cox

notes: |
  DOCSIS 3.1 modem with SC-QAM and OFDM/OFDMA support.
  Channel data embedded in JavaScript functions (NOT HTML tables).
  HTTPS requires Basic Auth (WWW-Authenticate: Basic realm="Netgear").
  HTTP serves pages without auth on some ISPs.
  Auth clarified via har-capture v0.4.4 probe (#121).
  Supports up to 32 SC-QAM downstream, 2 OFDM, 8 ATDMA upstream, 2 OFDMA.
  Upstream ATDMA symbol rate appears before frequency (differs from CM2000).

references:
  firmware_versions: "https://kb.netgear.com/000036375/What-is-the-latest-firmware-version-of-my-NETGEAR-cable-modem-or-modem-router"
